components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthProvider:
      type: string
      enum:
      - Local
      - Google
      - Microsoft
      - Apple
    AuthResponse:
      type: object
      required:
      - accessToken
      - expiresIn
      - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          nullable: true
        expiresIn:
          type: integer
          format: int32
        user:
          $ref: '#/components/schemas/UserDto'
    BankCatalogConcurrencyRequest:
      type: object
      required:
      - concurrencyToken
      properties:
        concurrencyToken:
          type: string
          format: uuid
    JobProfileCatalogTypeResponse:
      type: object
      required:
      - id
      - code
      - name
      - sortOrder
      - isActive
      - concurrencyToken
      - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: COMPETENCY
        name:
          type: string
          example: Competency
        sortOrder:
          type: integer
          format: int32
        isActive:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
          description: Current concurrency token; echo it (quoted) in the `If-Match` header of the next update.
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    PagedJobProfileCatalogTypeResponse:
      type: object
      required:
      - items
      - pageNumber
      - pageSize
      - totalCount
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobProfileCatalogTypeResponse'
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        totalCount:
          type: integer
          format: int32
    CreateJobProfileCatalogTypeRequest:
      type: object
      required:
      - code
      - name
      - sortOrder
      properties:
        code:
          type: string
          maxLength: 80
          example: COMPETENCY
        name:
          type: string
          maxLength: 200
          example: Competency
        sortOrder:
          type: integer
          format: int32
          minimum: 0
    UpdateJobProfileCatalogTypeRequest:
      type: object
      description: The code is immutable and is intentionally omitted.
      required:
      - name
      - sortOrder
      properties:
        name:
          type: string
          maxLength: 200
        sortOrder:
          type: integer
          format: int32
          minimum: 0
    DocumentTypeCatalogItemResponse:
      type: object
      required:
      - id
      - code
      - name
      - sortOrder
      - isActive
      - concurrencyToken
      - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: PASSPORT
        name:
          type: string
          example: Passport
        sortOrder:
          type: integer
          format: int32
        isActive:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
          description: Current concurrency token; echo it (quoted) in the `If-Match` header of the next update.
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    PagedDocumentTypeCatalogItemResponse:
      type: object
      required:
      - items
      - pageNumber
      - pageSize
      - totalCount
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTypeCatalogItemResponse'
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        totalCount:
          type: integer
          format: int32
    CreateDocumentTypeCatalogItemRequest:
      type: object
      required:
      - code
      - name
      - sortOrder
      properties:
        code:
          type: string
          maxLength: 80
          example: PASSPORT
        name:
          type: string
          maxLength: 200
          example: Passport
        sortOrder:
          type: integer
          format: int32
          minimum: 0
    UpdateDocumentTypeCatalogItemRequest:
      type: object
      required:
      - code
      - name
      - sortOrder
      properties:
        code:
          type: string
          maxLength: 80
        name:
          type: string
          maxLength: 200
        sortOrder:
          type: integer
          format: int32
          minimum: 0
    BankCatalogItemResponse:
      type: object
      required:
      - publicId
      - countryCode
      - code
      - name
      - isActive
      - sortOrder
      - concurrencyToken
      - createdAtUtc
      properties:
        publicId:
          type: string
          format: uuid
        countryCode:
          type: string
          example: SV
        code:
          type: string
          example: BANCO_AGRICOLA
        name:
          type: string
          example: Banco Agricola
        alias:
          type: string
          nullable: true
        swiftCode:
          type: string
          nullable: true
        routingCode:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
          format: int32
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    CancelPlatformCompanyAddonChangeRequest:
      type: object
      required:
      - observations
      properties:
        observations:
          type: string
    CancelPlatformCompanySubscriptionPlanChangeRequest:
      type: object
      required:
      - observations
      properties:
        observations:
          type: string
