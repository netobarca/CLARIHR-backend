        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Job Profile catalog type returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobProfileCatalogTypeResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The requested Job Profile catalog type was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      tags:
      - job-profile-catalog-types
      operationId: UpdateJobProfileCatalogType
      summary: Update a global Job Profile catalog type
      description: Replaces the editable fields (name, sort order). The code is immutable and is not accepted. Requires the current `concurrencyToken` in the `If-Match` header (missing → 400, stale → 409). The refreshed token is returned in the body and the `ETag` header.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        required: true
        description: Current `concurrencyToken` of the item, quoted as an HTTP ETag.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJobProfileCatalogTypeRequest'
      responses:
        '200':
          description: Job Profile catalog type updated successfully.
          headers:
            ETag:
              description: New concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobProfileCatalogTypeResponse'
        '400':
          description: Validation error, or the `If-Match` header is missing.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform admin access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The requested Job Profile catalog type was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Concurrency conflict.
          content:
