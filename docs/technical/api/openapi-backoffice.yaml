      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Paged global Job Profile catalog types.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedJobProfileCatalogTypeResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
      - job-profile-catalog-types
      operationId: CreateJobProfileCatalogType
      summary: Create a global Job Profile catalog type
      description: Creates a Job Profile catalog type. Returns `201`; the current `concurrencyToken` is included in the body and the `ETag` header.
