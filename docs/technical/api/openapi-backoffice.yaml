openapi: 3.0.3
info:
  title: CLARIHR Backoffice API
  version: 0.0-bootstrap
  description: |
    Platform/backoffice API contract (CLARIHR.Backoffice.Api): /api/platform/*. Core endpoints are in openapi.yaml.

    Partial hand-maintained OpenAPI supplement for externally relevant core and backoffice
    endpoints that need a checked-in contract before automated export/versioning is introduced.

    The exhaustive contract is still generated at runtime by Swagger in Development
    at /swagger/v1/swagger.json.

    Public API contracts expose `publicId` or `<entity>PublicId`; internal `id` and
    `internalId` never leave the backend. When a resource has business codes, the
    public contract exposes `code` and `normalizedCode`, both normalized to uppercase.

    Core API endpoints require tokens emitted with `client_type=core`. Platform
    backoffice endpoints under `/api/platform/*` require tokens emitted with
    `client_type=platform`.

    All `/api` routes emit `Cache-Control: no-store`, `Pragma: no-cache`, and
    `Expires: 0` to avoid caching sensitive HR or platform responses.
servers:
- url: /
security:
- Bearer: []
tags:
- name: platform-auth
  description: Platform backoffice authentication and session lifecycle.
- name: commercial-modules
  description: Canonical commercial module catalog exposed to the platform backoffice.
- name: commercial-addons
  description: Global commercial add-on catalog administration from the platform backoffice.
- name: commercial-plans
  description: Global commercial plan catalog administration from the platform backoffice.
- name: bank-catalogs
  description: Global bank catalog administration in backoffice and company-scoped bank lookup in core.
- name: platform-subscriptions
  description: Global company subscription, plan-change and company add-on administration from the platform backoffice.
- name: education-catalogs-backoffice
  description: Full CRUD administration of system-wide education catalogs from the Platform Backoffice.
paths:
  /api/platform/auth/login:
    post:
      tags:
      - platform-auth
      operationId: PlatformLogin
      summary: Login to the platform backoffice
      description: Authenticates a local user linked to an active PlatformOperator and returns a token with `client_type=platform` and no tenant context.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformLoginRequest'
      responses:
        '200':
          description: Platform session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Invalid credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated local user is not linked to an active platform operator.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/platform/auth/refresh:
    post:
      tags:
      - platform-auth
      operationId: PlatformRefresh
      summary: Refresh a platform backoffice session
      description: Rotates a refresh token previously issued for the platform backoffice.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformRefreshTokenRequest'
      responses:
        '200':
          description: Platform session refreshed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Invalid or expired refresh token.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The user no longer has active platform access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/platform/auth/logout:
    post:
      tags:
      - platform-auth
      operationId: PlatformLogout
      summary: Logout from the platform backoffice
      description: Revokes the current platform refresh token family for the authenticated platform user.
      security:
      - Bearer: []
      responses:
        '204':
          description: Platform session revoked successfully.
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated token does not have platform access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/platform/commercial-addons:
    get:
      tags:
      - commercial-addons
      operationId: SearchCommercialAddons
      summary: List global commercial add-ons
      description: Returns the paged catalog of global commercial add-ons, including massive and specialized pricing models. Requires an authenticated platform token and does not depend on tenant context.
      security:
      - Bearer: []
      parameters:
      - name: type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/CommercialAddonType'
      - name: billingModel
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
      - name: status
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/CommercialAddonStatus'
      - name: q
        in: query
        required: false
        schema:
          type: string
          maxLength: 150
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Paged commercial add-on summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCommercialAddonSummaryResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
      - commercial-addons
      operationId: CreateCommercialAddon
      summary: Create a global commercial add-on
      description: Creates a reusable global commercial add-on for future company-level activation and billing. Supports massive pricing per active employee and specialized pricing per seat or volume. Requires an authenticated platform token with admin access and does not depend on tenant context.
      security:
      - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommercialAddonRequest'
      responses:
        '201':
          description: Commercial add-on created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialAddonResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform admin access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as duplicated add-on code.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/platform/document-type-catalogs:
    get:
      tags:
      - document-type-catalogs
