        concurrencyToken:
          type: string
          format: uuid
    CommercialAddonPeriodicity:
      type: string
      enum:
      - Monthly
      - Annual
    CommercialAddonResponse:
      type: object
      required:
      - publicId
      - code
      - name
      - type
      - billingModel
      - measurementUnit
      - unitPrice
      - periodicity
      - status
      - moduleCount
      - moduleKeys
      - concurrencyToken
      - createdAtUtc
