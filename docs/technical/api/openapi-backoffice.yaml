      security:
      - Bearer: []
      parameters:
      - name: isActive
        in: query
        required: false
        schema:
          type: boolean
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: pageNumber
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 20
      responses:
        '200':
          description: Paged global document type catalog items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedDocumentTypeCatalogItemResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
      - document-type-catalogs
      operationId: CreateDocumentTypeCatalogItem
      summary: Create a global document type catalog item
      description: Creates a document type catalog item. Returns `201`; the current `concurrencyToken` is included in the body and the `ETag` header.
      security:
      - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentTypeCatalogItemRequest'
      responses:
        '201':
          description: Document type catalog item created successfully.
          headers:
            ETag:
              description: Current concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTypeCatalogItemResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform admin access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as duplicated code.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/platform/document-type-catalogs/{publicId}:
    get:
      tags:
      - document-type-catalogs
      operationId: GetDocumentTypeCatalogItemById
      summary: Get a global document type catalog item by public id
      description: Returns the item. The current `concurrencyToken` is included in the body for use in the `If-Match` header of a subsequent update.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Document type catalog item returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTypeCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The requested document type catalog item was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      tags:
      - document-type-catalogs
      operationId: UpdateDocumentTypeCatalogItem
      summary: Update a global document type catalog item
      description: Replaces the editable fields (code, name, sort order). Requires the current `concurrencyToken` in the `If-Match` header (missing → 400, stale → 409). The refreshed token is returned in the body and the `ETag` header.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        required: true
        description: Current `concurrencyToken` of the item, quoted as an HTTP ETag.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentTypeCatalogItemRequest'
      responses:
        '200':
          description: Document type catalog item updated successfully.
          headers:
            ETag:
              description: New concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTypeCatalogItemResponse'
        '400':
          description: Validation error, or the `If-Match` header is missing.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform admin access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The requested document type catalog item was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Concurrency conflict, or duplicated code.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
      - document-type-catalogs
      operationId: PatchDocumentTypeCatalogItem
      summary: Patch a global document type catalog item (RFC 6902 JSON Patch)
      description: Applies a partial update using JSON Patch (RFC 6902), media type `application/json-patch+json`. Patchable paths are `/code`, `/name`, `/sortOrder`. Activation state changes use the `/activate` and `/inactivate` actions. Requires the current `concurrencyToken` in the `If-Match` header (missing → 400, stale → 409). The refreshed token is returned in the body and the `ETag` header.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        required: true
        description: Current `concurrencyToken` of the item, quoted as an HTTP ETag.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              description: RFC 6902 JSON Patch operations.
              items:
                type: object
      responses:
        '200':
          description: Document type catalog item updated successfully.
          headers:
            ETag:
              description: New concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTypeCatalogItemResponse'
        '400':
          description: Validation error for one or more patch operations, or the `If-Match` header is missing.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform admin access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The requested document type catalog item was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Concurrency conflict, or duplicated code.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/platform/document-type-catalogs/{publicId}/activate:
    patch:
      tags:
      - document-type-catalogs
      operationId: ActivateDocumentTypeCatalogItem
      summary: Activate a global document type catalog item
      description: Activates the item. Requires the current `concurrencyToken` in the `If-Match` header (missing → 400, stale → 409). The refreshed token is returned in the body and the `ETag` header.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        required: true
        description: Current `concurrencyToken` of the item, quoted as an HTTP ETag.
        schema:
          type: string
      responses:
        '200':
          description: Document type catalog item activated successfully.
          headers:
            ETag:
              description: New concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTypeCatalogItemResponse'
        '400':
          description: The `If-Match` header is missing.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform admin access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The requested document type catalog item was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Concurrency conflict.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/platform/document-type-catalogs/{publicId}/inactivate:
    patch:
      tags:
      - document-type-catalogs
      operationId: InactivateDocumentTypeCatalogItem
      summary: Inactivate a global document type catalog item
      description: Inactivates the item (rejected if it is in use). Requires the current `concurrencyToken` in the `If-Match` header (missing → 400, stale → 409). The refreshed token is returned in the body and the `ETag` header.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        required: true
        description: Current `concurrencyToken` of the item, quoted as an HTTP ETag.
        schema:
          type: string
      responses:
        '200':
          description: Document type catalog item inactivated successfully.
          headers:
            ETag:
              description: New concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentTypeCatalogItemResponse'
        '400':
          description: The `If-Match` header is missing.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have platform admin access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The requested document type catalog item was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Concurrency conflict, or the item is in use.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/platform/job-profile-catalog-types:
