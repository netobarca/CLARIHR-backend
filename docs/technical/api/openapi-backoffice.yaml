      - createdAtUtc
      properties:
        publicId:
          type: string
          format: uuid
        code:
          type: string
          example: ADDON-RECRUITING
        name:
          type: string
          example: Recruiting ATS
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
          example: recruiter seat
        unitPrice:
          type: number
          format: decimal
          example: 12.5
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
          example: 2
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
          example: 35.0
        periodicity:
