  /api/platform/job-profile-catalog-types/{publicId}:
    get:
      tags:
      - job-profile-catalog-types
      operationId: GetJobProfileCatalogTypeById
      summary: Get a global Job Profile catalog type by public id
      description: Returns the catalog type. The current `concurrencyToken` is included in the body for use in the `If-Match` header of a subsequent update.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
