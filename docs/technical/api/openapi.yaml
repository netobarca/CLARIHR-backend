openapi: 3.0.3
info:
  title: CLARIHR APIs
  version: 0.0-bootstrap
  description: |
    Partial hand-maintained OpenAPI supplement for externally relevant core and backoffice
    endpoints that need a checked-in contract before automated export/versioning is introduced.

    The exhaustive contract is still generated at runtime by Swagger in Development
    at /swagger/v1/swagger.json.

    Public API contracts expose `publicId` or `<entity>PublicId`; internal `id` and
    `internalId` never leave the backend. When a resource has business codes, the
    public contract exposes `code` and `normalizedCode`, both normalized to uppercase.

    Core API endpoints require tokens emitted with `client_type=core`. Platform
    backoffice endpoints under `/api/platform/*` require tokens emitted with
    `client_type=platform`.
servers:
  - url: /
security:
  - Bearer: []
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CountryCatalogItemResponse:
      type: object
      required:
        - id
        - code
        - name
        - sortOrder
      properties:
        id:
          type: string
          format: uuid
          description: Stable public identifier for the active country catalog item.
        code:
          type: string
          maxLength: 2
          description: ISO-style country code that must be sent in CreateAccountCompanyRequest.countryCode.
          example: SV
        name:
          type: string
          description: Human-readable country name for display in the client.
          example: El Salvador
        sortOrder:
          type: integer
          format: int32
          example: 69
    LegalRepresentativeDocumentTypeCatalogItemResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - sortOrder
      properties:
        publicId:
          type: string
          format: uuid
          description: Stable public identifier for the seeded legal representative document type.
        code:
          type: string
          description: String enum value that must be sent in initialLegalRepresentative.documentType.
          example: TAXID
        normalizedCode:
          type: string
          description: Uppercase normalized code used for searches and uniqueness.
          example: TAXID
        name:
          type: string
          description: Human-readable label for display in the client.
          example: Tax ID
        sortOrder:
          type: integer
          format: int32
          example: 1
    LegalRepresentativePositionTitleCatalogItemResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - sortOrder
      properties:
        publicId:
          type: string
          format: uuid
          description: Stable public identifier for the seeded legal representative position title.
        code:
          type: string
          description: Stable frontend key for the seeded position title.
          example: INFRASTRUCTURE_DEVOPS
        normalizedCode:
          type: string
          description: Uppercase normalized code used for searches and uniqueness.
          example: INFRASTRUCTURE_DEVOPS
        name:
          type: string
          description: Display value and current string payload accepted by initialLegalRepresentative.positionTitle.
          example: Infrastructure / DevOps
        sortOrder:
          type: integer
          format: int32
          example: 14
    LegalRepresentativeRepresentationTypeCatalogItemResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - sortOrder
      properties:
        publicId:
          type: string
          format: uuid
          description: Stable public identifier for the seeded legal representative representation type.
        code:
          type: string
          description: String enum value that must be sent in initialLegalRepresentative.representationType.
          example: PRIMARYLEGALREPRESENTATIVE
        normalizedCode:
          type: string
          description: Uppercase normalized code used for searches and uniqueness.
          example: PRIMARYLEGALREPRESENTATIVE
        name:
          type: string
          description: Human-readable label for display in the client.
          example: Primary Legal Representative
        sortOrder:
          type: integer
          format: int32
          example: 1
    InitialLegalRepresentativeRequest:
      type: object
      required:
        - firstName
        - lastName
        - documentType
        - documentNumber
        - positionTitle
        - representationType
        - effectiveFromUtc
      properties:
        firstName:
          type: string
          maxLength: 100
          example: Ana
        lastName:
          type: string
          maxLength: 100
          example: Mendoza
        documentType:
          type: string
          example: TAXID
        documentNumber:
          type: string
          maxLength: 80
          example: 0614-290190-102-3
        positionTitle:
          type: string
          maxLength: 150
          example: Representante Legal
        representationType:
          type: string
          example: PRIMARYLEGALREPRESENTATIVE
        authorityDescription:
          type: string
          nullable: true
          maxLength: 500
        appointmentInstrument:
          type: string
          nullable: true
          maxLength: 500
        appointmentDateUtc:
          type: string
          format: date-time
          nullable: true
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        email:
          type: string
          format: email
          nullable: true
          maxLength: 320
        phone:
          type: string
          nullable: true
          maxLength: 40
        isPrimary:
          type: boolean
          nullable: true
          description: Optional. When omitted or null, the legal representative is created without a primary flag.
          example: true
    CompanyTypeMetadataResponse:
      type: object
      required:
        - id
        - code
        - name
        - isActive
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: SA_DE_CV
        name:
          type: string
          example: Sociedad Anonima de Capital Variable
        isActive:
          type: boolean
    CompanyTypeCatalogItemResponse:
      type: object
      required:
        - id
        - code
        - name
        - sortOrder
        - isActive
        - concurrencyToken
        - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
          description: Stable public identifier for the active company type catalog item.
        code:
          type: string
          example: SA_DE_CV
        name:
          type: string
          example: Sociedad Anonima de Capital Variable
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
          format: int32
          example: 10
        isActive:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    ActiveLegalRepresentativeSummaryResponse:
      type: object
      required:
        - publicId
        - fullName
        - representationType
        - positionTitle
      properties:
        publicId:
          type: string
          format: uuid
        fullName:
          type: string
        representationType:
          type: string
          example: PRIMARYLEGALREPRESENTATIVE
        positionTitle:
          type: string
        isPrimary:
          type: boolean
          nullable: true
          description: Null means the onboarding flow did not specify a primary flag.
    AccountCompanyDetailResponse:
      type: object
      required:
        - companyPublicId
        - name
        - slug
        - countryCode
        - status
        - planCode
        - isActiveContext
        - isOwnedByCurrentUser
        - createdAtUtc
        - activeLegalRepresentatives
      properties:
        companyPublicId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        countryCode:
          type: string
        status:
          type: string
          example: Active
        planCode:
          type: string
          example: FREE
        isActiveContext:
          type: boolean
        isOwnedByCurrentUser:
          type: boolean
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
        activeLegalRepresentatives:
          type: array
          items:
            $ref: '#/components/schemas/ActiveLegalRepresentativeSummaryResponse'
        companyType:
          allOf:
            - $ref: '#/components/schemas/CompanyTypeMetadataResponse'
          nullable: true
    CreateAccountCompanyRequest:
      type: object
      required:
        - name
        - countryCode
        - initialLegalRepresentative
      properties:
        name:
          type: string
          maxLength: 150
          example: Acme Services
        countryCode:
          type: string
          maxLength: 3
          description: Country code selected from the authenticated country catalog endpoint.
          example: SV
        companyTypePublicId:
          type: string
          format: uuid
          nullable: true
          description: Optional company type selected from the authenticated country-specific company type catalog endpoint.
        initialLegalRepresentative:
          $ref: '#/components/schemas/InitialLegalRepresentativeRequest'
    AuthProvider:
      type: string
      enum:
        - Local
        - Google
        - Microsoft
        - Apple
    UserDto:
      type: object
      required:
        - publicId
        - email
        - firstName
        - lastName
        - authProvider
      properties:
        publicId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        authProvider:
          $ref: '#/components/schemas/AuthProvider'
    AuthResponse:
      type: object
      required:
        - accessToken
        - expiresIn
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          nullable: true
        expiresIn:
          type: integer
          format: int32
        user:
          $ref: '#/components/schemas/UserDto'
    PlatformLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          maxLength: 100
    PlatformRefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          maxLength: 2048
    CommercialPlanStatus:
      type: string
      enum:
        - Draft
        - Active
        - Inactive
    CommercialAddonType:
      type: string
      enum:
        - Massive
        - Specialized
    CommercialAddonBillingModel:
      type: string
      enum:
        - PerActiveEmployee
        - PerSeat
        - PerVolume
    CommercialAddonPeriodicity:
      type: string
      enum:
        - Monthly
        - Annual
    CommercialAddonStatus:
      type: string
      enum:
        - Draft
        - Active
        - Inactive
    SubscriptionStatus:
      type: string
      enum:
        - Active
        - Cancelled
        - Expired
    CommercialAddonSummaryResponse:
      type: object
      required:
        - publicId
        - code
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - periodicity
        - status
        - createdAtUtc
      properties:
        publicId:
          type: string
          format: uuid
        code:
          type: string
          example: ADDON-RECRUITING
        name:
          type: string
          example: Recruiting ATS
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
          example: recruiter seat
        unitPrice:
          type: number
          format: decimal
          example: 12.50
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
          example: 2
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
          example: 35.00
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        status:
          $ref: '#/components/schemas/CommercialAddonStatus'
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    CommercialAddonResponse:
      type: object
      required:
        - publicId
        - code
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - periodicity
        - status
        - concurrencyToken
        - createdAtUtc
      properties:
        publicId:
          type: string
          format: uuid
        code:
          type: string
          example: ADDON-RECRUITING
        name:
          type: string
          example: Recruiting ATS
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
          example: recruiter seat
        unitPrice:
          type: number
          format: decimal
          example: 12.50
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
          example: 2
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
          example: 35.00
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        status:
          $ref: '#/components/schemas/CommercialAddonStatus'
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    CreateCommercialAddonRequest:
      type: object
      required:
        - code
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - periodicity
        - status
      properties:
        code:
          type: string
          maxLength: 40
          example: ADDON-ATTENDANCE
        name:
          type: string
          maxLength: 150
          example: Attendance
        description:
          type: string
          nullable: true
          maxLength: 500
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
          maxLength: 80
          example: recruiter seat
        unitPrice:
          type: number
          format: decimal
          example: 12.50
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
          example: 2
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
          example: 35.00
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        status:
          $ref: '#/components/schemas/CommercialAddonStatus'
    UpdateCommercialAddonRequest:
      type: object
      required:
        - code
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - periodicity
        - concurrencyToken
      properties:
        code:
          type: string
          maxLength: 40
          example: ADDON-ATTENDANCE
        name:
          type: string
          maxLength: 150
          example: Attendance Plus
        description:
          type: string
          nullable: true
          maxLength: 500
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
          maxLength: 80
          example: vacante
        unitPrice:
          type: number
          format: decimal
          example: 1.50
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        concurrencyToken:
          type: string
          format: uuid
    CommercialAddonConcurrencyRequest:
      type: object
      required:
        - concurrencyToken
      properties:
        concurrencyToken:
          type: string
          format: uuid
    PagedCommercialAddonSummaryResponse:
      type: object
      required:
        - items
        - pageNumber
        - pageSize
        - totalCount
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommercialAddonSummaryResponse'
        pageNumber:
          type: integer
          format: int32
          example: 1
        pageSize:
          type: integer
          format: int32
          example: 20
        totalCount:
          type: integer
          format: int32
          example: 2
    CommercialPlanLimitInput:
      type: object
      required:
        - code
        - value
      properties:
        code:
          type: string
          maxLength: 80
          example: EMPLOYEES
        value:
          type: number
          format: decimal
          example: 25
    CommercialPlanLimitResponse:
      type: object
      required:
        - code
        - normalizedCode
        - value
      properties:
        code:
          type: string
          example: EMPLOYEES
        normalizedCode:
          type: string
          example: EMPLOYEES
        value:
          type: number
          format: decimal
          example: 25
    CommercialPlanSummaryResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - baseMonthlyFee
        - pricePerActiveEmployee
        - status
        - isSystemPlan
        - createdAtUtc
      properties:
        publicId:
          type: string
          format: uuid
        code:
          type: string
          example: PRO
        normalizedCode:
          type: string
          example: PRO
        name:
          type: string
          example: Professional
        description:
          type: string
          nullable: true
        baseMonthlyFee:
          type: number
          format: decimal
          example: 120.00
        pricePerActiveEmployee:
          type: number
          format: decimal
          example: 3.50
        status:
          $ref: '#/components/schemas/CommercialPlanStatus'
        isSystemPlan:
          type: boolean
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    CommercialPlanResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - baseMonthlyFee
        - pricePerActiveEmployee
        - status
        - isSystemPlan
        - concurrencyToken
        - createdAtUtc
        - limits
      properties:
        publicId:
          type: string
          format: uuid
        code:
          type: string
          example: PRO
        normalizedCode:
          type: string
          example: PRO
        name:
          type: string
          example: Professional
        description:
          type: string
          nullable: true
        baseMonthlyFee:
          type: number
          format: decimal
          example: 120.00
        pricePerActiveEmployee:
          type: number
          format: decimal
          example: 3.50
        status:
          $ref: '#/components/schemas/CommercialPlanStatus'
        isSystemPlan:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
        limits:
          type: array
          items:
            $ref: '#/components/schemas/CommercialPlanLimitResponse'
    CreateCommercialPlanRequest:
      type: object
      required:
        - code
        - name
        - baseMonthlyFee
        - pricePerActiveEmployee
        - status
        - limits
      properties:
        code:
          type: string
          maxLength: 40
          example: PRO
        name:
          type: string
          maxLength: 150
          example: Professional
        description:
          type: string
          nullable: true
          maxLength: 500
        baseMonthlyFee:
          type: number
          format: decimal
          example: 120.00
        pricePerActiveEmployee:
          type: number
          format: decimal
          example: 3.50
        status:
          $ref: '#/components/schemas/CommercialPlanStatus'
        limits:
          type: array
          items:
            $ref: '#/components/schemas/CommercialPlanLimitInput'
    UpdateCommercialPlanRequest:
      type: object
      required:
        - code
        - name
        - baseMonthlyFee
        - pricePerActiveEmployee
        - limits
        - concurrencyToken
      properties:
        code:
          type: string
          maxLength: 40
          example: PRO
        name:
          type: string
          maxLength: 150
          example: Professional Plus
        description:
          type: string
          nullable: true
          maxLength: 500
        baseMonthlyFee:
          type: number
          format: decimal
          example: 180.00
        pricePerActiveEmployee:
          type: number
          format: decimal
          example: 4.00
        limits:
          type: array
          items:
            $ref: '#/components/schemas/CommercialPlanLimitInput'
        concurrencyToken:
          type: string
          format: uuid
    CommercialPlanConcurrencyRequest:
      type: object
      required:
        - concurrencyToken
      properties:
        concurrencyToken:
          type: string
          format: uuid
    PagedCommercialPlanSummaryResponse:
      type: object
      required:
        - items
        - pageNumber
        - pageSize
        - totalCount
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommercialPlanSummaryResponse'
        pageNumber:
          type: integer
          format: int32
          example: 1
        pageSize:
          type: integer
          format: int32
          example: 20
        totalCount:
          type: integer
          format: int32
          example: 2
    PlatformCompanySubscriptionResponse:
      type: object
      required:
        - subscriptionPublicId
        - companyPublicId
        - commercialPlanPublicId
        - commercialPlanVersionId
        - planCode
        - planName
        - planVersionNumber
        - baseMonthlyFee
        - pricePerActiveEmployee
        - periodicity
        - currencyCode
        - status
        - startDateUtc
        - activatedByUserId
        - activatedAtUtc
        - createdAtUtc
      properties:
        subscriptionPublicId:
          type: string
          format: uuid
        companyPublicId:
          type: string
          format: uuid
        commercialPlanPublicId:
          type: string
          format: uuid
        commercialPlanVersionId:
          type: string
          format: uuid
        planCode:
          type: string
          example: FREE
        planName:
          type: string
          example: Free
        planVersionNumber:
          type: integer
          format: int32
          example: 1
        baseMonthlyFee:
          type: number
          format: decimal
          example: 0
        pricePerActiveEmployee:
          type: number
          format: decimal
          example: 0
        periodicity:
          $ref: '#/components/schemas/CompanySubscriptionPeriodicity'
        currencyCode:
          type: string
          example: USD
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        startDateUtc:
          type: string
          format: date-time
        endDateUtc:
          type: string
          format: date-time
          nullable: true
        activatedByUserId:
          type: string
          format: uuid
        activatedAtUtc:
          type: string
          format: date-time
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    PlatformCompanySubscriptionOverviewResponse:
      type: object
      required:
        - companyPublicId
        - companyName
        - companySlug
        - companyStatus
        - isBillable
      properties:
        companyPublicId:
          type: string
          format: uuid
        companyName:
          type: string
        companySlug:
          type: string
        companyStatus:
          $ref: '#/components/schemas/CompanyStatus'
        isBillable:
          type: boolean
        billableSinceUtc:
          type: string
          format: date-time
          nullable: true
        currentSubscription:
          $ref: '#/components/schemas/PlatformCompanySubscriptionResponse'
          nullable: true
        scheduledReplacement:
          $ref: '#/components/schemas/PlatformCompanySubscriptionResponse'
          nullable: true
    PlatformCompanySubscriptionPreviewResponse:
      type: object
      required:
        - companyPublicId
        - companyName
        - companySlug
        - companyStatus
        - isBillable
        - commercialPlanPublicId
        - commercialPlanVersionId
        - planCode
        - planName
        - planVersionNumber
        - baseMonthlyFee
        - pricePerActiveEmployee
        - periodicity
        - currencyCode
        - resolvedStatus
        - startDateUtc
        - isEligible
        - ineligibilityReasons
      properties:
        companyPublicId:
          type: string
          format: uuid
        companyName:
          type: string
        companySlug:
          type: string
        companyStatus:
          $ref: '#/components/schemas/CompanyStatus'
        isBillable:
          type: boolean
        commercialPlanPublicId:
          type: string
          format: uuid
        commercialPlanVersionId:
          type: string
          format: uuid
        planCode:
          type: string
        planName:
          type: string
        planVersionNumber:
          type: integer
          format: int32
        baseMonthlyFee:
          type: number
          format: decimal
        pricePerActiveEmployee:
          type: number
          format: decimal
        periodicity:
          $ref: '#/components/schemas/CompanySubscriptionPeriodicity'
        currencyCode:
          type: string
        resolvedStatus:
          $ref: '#/components/schemas/SubscriptionStatus'
        startDateUtc:
          type: string
          format: date-time
        isEligible:
          type: boolean
        ineligibilityReasons:
          type: array
          items:
            type: string
    PlatformCompanySubscriptionListItemResponse:
      type: object
      required:
        - companyPublicId
        - companyName
        - companySlug
        - isBillable
        - subscriptionPublicId
        - commercialPlanPublicId
        - commercialPlanVersionId
        - planCode
        - planName
        - planVersionNumber
        - startDateUtc
        - periodicity
        - currencyCode
        - status
      properties:
        companyPublicId:
          type: string
          format: uuid
        companyName:
          type: string
