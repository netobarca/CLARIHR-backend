          type: string
          format: uuid
          nullable: true
        decisionScope:
          type: string
          nullable: true
          maxLength: 4000
        assignedResources:
          type: string
          nullable: true
          maxLength: 4000
        responsibilities:
          type: string
          nullable: true
          maxLength: 4000
        benefitsSummary:
          type: string
          nullable: true
          maxLength: 4000
        workingConditionSummary:
          type: string
          nullable: true
          maxLength: 4000
        marketSalaryReference:
          type: string
          nullable: true
          maxLength: 4000
        valuationNotes:
          type: string
          nullable: true
          maxLength: 4000
        effectiveFromUtc:
          type: string
          format: date-time
          nullable: true
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        allowInlineCatalogCreate:
          type: boolean
          default: false
        requirements:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JobProfileRequirementRequest'
        functions:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JobProfileFunctionRequest'
        relations:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JobProfileRelationRequest'
        competencies:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JobProfileCompetencyRequest'
        trainings:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JobProfileTrainingRequest'
        compensation:
          allOf:
            - $ref: '#/components/schemas/JobProfileCompensationRequest'
          nullable: true
        benefits:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JobProfileBenefitRequest'
        workingConditions:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JobProfileWorkingConditionRequest'
        dependentPositions:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/JobProfileDependentPositionRequest'
    JobProfileUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/JobProfileUpsertRequest'
        - type: object
          required:
            - concurrencyToken
          properties:
            concurrencyToken:
              type: string
              format: uuid
    JobProfileContractResponse:
      type: object
      description: Partial checked-in contract for the job profile aggregate. Runtime Swagger still exposes the exhaustive nested response shape.
      required:
        - id
        - companyId
        - code
        - title
        - status
        - version
        - orgUnitId
        - orgUnitName
        - isActive
        - concurrencyToken
        - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        status:
          $ref: '#/components/schemas/JobProfileStatus'
        version:
          type: integer
          format: int32
        orgUnitId:
          type: string
          format: uuid
        orgUnitName:
          type: string
        isActive:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    PositionSlotCreateRequest:
      type: object
      required:
        - code
        - jobProfilePublicId
        - status
        - maxEmployees
        - occupiedEmployees
        - effectiveFromUtc
      properties:
        code:
          type: string
          maxLength: 50
          example: PS-FIN-001
        title:
          type: string
          nullable: true
          maxLength: 180
        jobProfilePublicId:
          type: string
          format: uuid
          description: The linked job profile. `OrgUnit` and `CostCenterCode` are derived from this profile and must not be sent explicitly.
        rolePublicId:
          type: string
          format: uuid
          nullable: true
          description: Optional tenant-scoped IAM role inherited later by users auto-provisioned from completed personnel files assigned to this slot.
        workCenterPublicId:
          type: string
          format: uuid
          nullable: true
        directDependencyPositionSlotPublicId:
          type: string
          format: uuid
          nullable: true
        functionalDependencyPositionSlotPublicId:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: '#/components/schemas/PositionSlotStatus'
        maxEmployees:
          type: integer
          format: int32
          minimum: 1
        occupiedEmployees:
          type: integer
          format: int32
          minimum: 0
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 2000
    PositionSlotUpdateRequest:
      type: object
      required:
        - code
        - jobProfilePublicId
        - maxEmployees
        - effectiveFromUtc
        - concurrencyToken
      properties:
        code:
          type: string
          maxLength: 50
          example: PS-FIN-001
        title:
          type: string
          nullable: true
          maxLength: 180
        jobProfilePublicId:
          type: string
          format: uuid
          description: The linked job profile. Updating it changes the derived `OrgUnit` and `CostCenterCode` exposed by the slot.
        rolePublicId:
          type: string
          format: uuid
          nullable: true
          description: Optional tenant-scoped IAM role configured for this slot.
        workCenterPublicId:
          type: string
          format: uuid
          nullable: true
        maxEmployees:
          type: integer
          format: int32
          minimum: 1
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 2000
        concurrencyToken:
          type: string
          format: uuid
    PositionSlotContractResponse:
      type: object
      description: Partial checked-in contract for position slot create/update responses. `orgUnitId`, `orgUnitName` and `costCenterCode` are inferred from the linked job profile.
      required:
        - id
        - companyId
        - code
        - status
        - jobProfileId
        - jobProfileCode
        - jobProfileTitle
        - orgUnitId
        - orgUnitName
        - maxEmployees
        - occupiedEmployees
        - effectiveFromUtc
        - isActive
        - concurrencyToken
        - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PositionSlotStatus'
        jobProfileId:
          type: string
          format: uuid
        jobProfileCode:
          type: string
        jobProfileTitle:
          type: string
        roleId:
          type: string
          format: uuid
          nullable: true
        roleName:
          type: string
          nullable: true
        orgUnitId:
          type: string
          format: uuid
        orgUnitName:
          type: string
        workCenterId:
          type: string
          format: uuid
          nullable: true
        workCenterName:
          type: string
          nullable: true
        costCenterCode:
          type: string
          nullable: true
          description: Derived from `jobProfile.orgUnit.costCenterCode`.
        maxEmployees:
          type: integer
          format: int32
        occupiedEmployees:
          type: integer
          format: int32
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    UserPreferenceResponse:
      type: object
      required:
        - id
        - language
        - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
        language:
          type: string
          maxLength: 3
          pattern: "^[A-Za-z]{2,3}$"
          description: Language selected by the authenticated user profile.
          example: es
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    UpdateUserPreferencesRequest:
      type: object
      required:
        - language
      properties:
        language:
          type: string
          maxLength: 3
          pattern: "^[A-Za-z]{2,3}$"
          example: en
    CompanyPreferenceResponse:
      type: object
      required:
        - id
        - currencyCode
        - timeZone
        - concurrencyToken
        - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
        currencyCode:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
        timeZone:
          type: string
          maxLength: 100
          example: America/El_Salvador
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    UpdateCompanyPreferencesRequest:
      type: object
      required:
        - currencyCode
        - timeZone
        - concurrencyToken
      properties:
        currencyCode:
          type: string
          minLength: 3
          maxLength: 3
          example: EUR
        timeZone:
          type: string
          maxLength: 100
          example: Europe/Madrid
        concurrencyToken:
          type: string
          format: uuid
    ReportExportJobStatus:
      type: string
      enum:
        - Queued
        - Running
        - Succeeded
        - Failed
        - Cancelled
        - Expired
    CreateReportExportJobRequest:
      type: object
      required:
        - resourceKey
        - format
        - parameters
      properties:
        resourceKey:
          type: string
          example: PERSONNEL_FILES
          description: Supported export resource key.
        format:
          type: string
          enum:
            - csv
            - xlsx
            - json
          example: xlsx
        parameters:
          type: object
          additionalProperties: true
          description: Filter/sort parameters for the selected resource. Raw parameters are not returned by status endpoints.
          example:
            isActive: true
            sortBy: createdUtc
    ReportExportJobResponse:
      type: object
      required:
        - id
        - resourceKey
        - format
        - status
        - queuedUtc
        - attempts
      properties:
        id:
          type: string
          format: uuid
        resourceKey:
          type: string
          example: PERSONNEL_FILES
        format:
          type: string
          example: xlsx
        status:
          $ref: '#/components/schemas/ReportExportJobStatus'
        queuedUtc:
          type: string
          format: date-time
        startedUtc:
          type: string
          format: date-time
          nullable: true
        completedUtc:
          type: string
          format: date-time
          nullable: true
        expiresUtc:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
          format: int32
        rowCount:
          type: integer
          format: int32
          nullable: true
        fileName:
          type: string
          nullable: true
        sizeBytes:
          type: integer
          format: int64
          nullable: true
        lastErrorCode:
          type: string
          nullable: true
        lastErrorMessage:
          type: string
          nullable: true
    PagedReportExportJobResponse:
      type: object
      required:
        - items
        - pageNumber
        - pageSize
        - totalCount
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportExportJobResponse'
        pageNumber:
          type: integer
          format: int32
          example: 1
        pageSize:
          type: integer
          format: int32
          example: 20
        totalCount:
          type: integer
          format: int32
paths:
  /api/audit/logs:
    get:
      tags:
        - audit
      operationId: ListAuditLogs
      summary: List tenant audit logs
      description: Returns a paged audit log list scoped to the active tenant. `totalCount` is computed after applying every server-side filter, including `EntityPublicId`.
      security:
        - Bearer: []
      parameters:
        - name: fromUtc
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: toUtc
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: ActorUserPublicId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Public identifier of the audit actor. Compatibility aliases `ActorUserId` and `actorUserId` are also accepted in query string.
        - name: EntityPublicId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Public identifier of the audited subject entity. This follows the backend public contract standard. Compatibility aliases `EntityId` and `entityId` are also accepted in query string and normalized server-side.
        - name: entityType
          in: query
          required: false
          schema:
            type: string
          description: Canonical audit entity type such as `User`, `Role`, `JobProfile` or `OrgUnit`.
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paged tenant audit log list after applying all filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAuditLogSummaryResponse'
        '400':
          description: Validation error, such as an empty GUID or an unknown audit catalog value.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have audit log read access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/audit/logs/{publicId}:
    get:
      tags:
        - audit
      operationId: GetAuditLogByPublicId
      summary: Get tenant audit log detail
      description: Returns the complete audit log detail for a single public identifier in the active tenant.
      security:
        - Bearer: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Audit log detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogDetailResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The audit log belongs to another tenant or the user lacks permission.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Audit log not found in the active tenant.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/legal-representative-position-titles:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyLegalRepresentativePositionTitles
      summary: List legal representative position titles for account onboarding
      description: Returns the active catalog entries that should populate the legal representative position title selector before creating a company.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active legal representative position title catalog items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LegalRepresentativePositionTitleCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/legal-representative-representation-types:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyLegalRepresentativeRepresentationTypes
      summary: List legal representative representation types for account onboarding
      description: Returns the active catalog entries that should populate the legal representative representation type selector before creating a company.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active legal representative representation type catalog items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LegalRepresentativeRepresentationTypeCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/countries:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyCountries
      summary: List active country catalog items
      description: Returns the authenticated global country catalog used by the account company creation flow.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active country catalog returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CountryCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/company-types:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyTypes
      summary: List active company types for a selected country
      description: Returns the authenticated global company type catalog filtered by the selected country code.
      security:
        - Bearer: []
      parameters:
        - name: countryCode
          in: query
          required: true
          schema:
            type: string
            maxLength: 3
            example: SV
      responses:
        '200':
          description: Active company type catalog returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompanyTypeCatalogItemResponse'
        '400':
          description: Validation error for the requested country code.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies:
    post:
      tags:
        - account-companies
      operationId: CreateAccountCompany
      summary: Create a company for the authenticated account
      description: Creates a new company, links it to an active country catalog item, provisions the initial tenant data, and accepts an initial legal representative whose primary flag is optional.
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountCompanyRequest'
      responses:
        '201':
          description: Company created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyDetailResponse'
        '400':
          description: Validation error, including country codes not found in the active catalog.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as company limit reached.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/{publicId}/subscription:
    get:
      tags:
        - account-company-subscriptions
      operationId: GetOwnedCompanySubscription
      summary: Get the owner-facing commercial overview for a company
      security:
        - Bearer: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Owner subscription overview returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanySubscriptionOverviewResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not own the company.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Company was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      tags:
        - account-company-subscriptions
      operationId: ChangeOwnedCompanySubscription
      summary: Apply an immediate owner-initiated plan change
      description: Applies an immediate owner-driven plan replacement. Downgrading to `FREE` deactivates active add-ons in the same transaction; `MASTER` remains reserved for CLARI operators and returns `403` for regular owners.
      security:
        - Bearer: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOwnedCompanySubscriptionRequest'
      responses:
        '200':
          description: Plan change applied and overview returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanySubscriptionOverviewResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not own the company or is not allowed to target the reserved `MASTER` plan.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Company or target plan was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as inactive target plan or missing eligibility.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/{publicId}/subscription/plans:
    get:
      tags:
        - account-company-subscriptions
      operationId: GetOwnedCompanySubscriptionPlans
      summary: List active commercial plans visible to the owner
      description: Returns active plans visible to the authenticated owner. `FREE` remains visible for controlled downgrades, while `MASTER` is listed only when the same actor also has an active `PlatformOperator`.
      security:
        - Bearer: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Active plans returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountCompanySubscriptionPlanResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not own the company or is not allowed to target the reserved `MASTER` plan.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Company was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/{publicId}/subscription/preview:
    post:
      tags:
        - account-company-subscriptions
      operationId: PreviewOwnedCompanySubscriptionPlanChange
      summary: Preview an immediate owner-initiated plan change
      description: Computes the immediate plan-change preview for an owned company. `MASTER` is reserved for CLARI operators and returns `403` when the authenticated owner does not also have an active `PlatformOperator`.
      security:
        - Bearer: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewOwnedCompanySubscriptionRequest'
      responses:
        '200':
          description: Plan preview returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanySubscriptionPlanPreviewResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not own the company or is not allowed to target the reserved `MASTER` plan.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
