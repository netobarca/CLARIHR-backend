      summary: 'HR analytics dashboard — documentary personnel actions (journal) section'
      description: "First tenant-wide read of the personnel-action journal (RF-005…RF-009): a 12-month series\n(zeros included) plus breakdowns by type (action-types catalog), status (action-statuses catalog —\nalways over the COMPLETE status universe, RN-04), origin (manual vs automático = IsSystemGenerated)\nand organizational dimension (each action attributed to its employee's CURRENT active-assignment\nunit, D-07). Defaults to the APLICADA population; includeAllStatuses=true widens the items to every\nstatus (the byStatus breakdown is unaffected). Honors the common dimension filters plus the flow\nmonth filter (month requires an explicit year → 400 DASHBOARD_MONTH_REQUIRES_YEAR; year defaults to\nthe current year). NO monetary fields are returned (aclaración №8). Requires the ViewReports or Read\npermission (gated in the handler)."
