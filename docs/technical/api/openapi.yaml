    patch:
      tags:
        - Personnel Files
      summary: Decide a vacation request (approve / reject)
      description: "HR decision on a SOLICITADA request. When `approve` is true the request is approved and consumes the fund via `allocations` (Σ = requested days; an empty set uses the FIFO suggestion), re-verifying the fund inside the transaction (race → `VACATION_FUND_INSUFFICIENT`; Σ mismatch → `VACATION_ALLOCATION_MISMATCH`) and journaling the GOCE_VACACIONES personnel action. When false the request is rejected. The deciding user must not be the subject employee (anti-self, 403). Requires the `If-Match` header."
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: vacationRequestPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: true
