  '/api/v1/personnel-files/{publicId}/retirement-requests/{retirementRequestPublicId}/reversal':
    patch:
      tags:
        - Personnel Files
      summary: Revert an EXECUTED retirement (restores the execution snapshot)
      description: "Undoes an `EJECUTADA` baja in ONE transaction, restoring exactly what the execution changed\n(D-11): the profile's retirement metadata is cleared and its PRIOR employment status restored, the\npersonnel file is reactivated with its prior rehire-block state, the closed plaza assignments and\ncontracts are reopened with their PREVIOUS end dates, the login is reactivated only if it was\nactive before, the exit-interview submissions are archived (D-09 — the baja \"did not happen\") and\na `REVERSION_BAJA` action is journaled. Seniority resumes CONTINUOUS (unlike a rehire, which opens\na new period). Blocks (422): more than 30 calendar days since the execution (ratified RN-012.4 —\nuse a rehire instead), a rehire after the execution (D-10), a diverged employee state (RN-012.2),\nor not being the most recent executed retirement (RN-012.3). The reason is MANDATORY; the subject\nemployee cannot revert their own baja (403). Requires the dedicated `RevertRetirement` grant\n(`PersonnelFiles.Admin` does NOT imply it) and the `If-Match` header with the request's current\n`concurrencyToken`. After reverting, the employee is eligible for a NEW retirement request."
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: retirementRequestPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
