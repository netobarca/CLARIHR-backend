          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/v1/companies/{companyPublicId}/job-catalogs/{category}/{jobCatalogPublicId}':
    put:
      tags:
        - Job Profiles
      summary: Replace a job catalog item
      description: "Replaces all fields (`code`, `name`, `isActive`) of an existing job\ncatalog item. Requires the `If-Match` header with the current\n`concurrencyToken` to prevent lost updates. The new token is returned\nin the `ETag` header.\n\nSystem items cannot be modified and the `code` must remain unique\nwithin the category.\n\n**Requires permission:** one of `JobCatalogs.Admin`, `iam.administration.manage`."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
