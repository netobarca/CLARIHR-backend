openapi: 3.0.3
info:
  title: CLARIHR API
  version: 0.0-bootstrap
  description: |
    Partial hand-maintained OpenAPI supplement for externally relevant endpoints that need
    a checked-in contract before automated export/versioning is introduced.

    The exhaustive contract is still generated at runtime by Swagger in Development
    at /swagger/v1/swagger.json.

    Public API contracts expose `publicId` or `<entity>PublicId`; internal `id` and
    `internalId` never leave the backend. When a resource has business codes, the
    public contract exposes `code` and `normalizedCode`, both normalized to uppercase.
servers:
  - url: /
security:
  - Bearer: []
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CountryCatalogItemResponse:
      type: object
      required:
        - id
        - code
        - name
        - sortOrder
      properties:
        id:
          type: string
          format: uuid
          description: Stable public identifier for the active country catalog item.
        code:
          type: string
          maxLength: 2
          description: ISO-style country code that must be sent in CreateAccountCompanyRequest.countryCode.
          example: SV
        name:
          type: string
          description: Human-readable country name for display in the client.
          example: El Salvador
        sortOrder:
          type: integer
          format: int32
          example: 69
    LegalRepresentativeDocumentTypeCatalogItemResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - sortOrder
      properties:
        publicId:
          type: string
          format: uuid
          description: Stable public identifier for the seeded legal representative document type.
        code:
          type: string
          description: String enum value that must be sent in initialLegalRepresentative.documentType.
          example: TAXID
        normalizedCode:
          type: string
          description: Uppercase normalized code used for searches and uniqueness.
          example: TAXID
        name:
          type: string
          description: Human-readable label for display in the client.
          example: Tax ID
        sortOrder:
          type: integer
          format: int32
          example: 1
    LegalRepresentativePositionTitleCatalogItemResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - sortOrder
      properties:
        publicId:
          type: string
          format: uuid
          description: Stable public identifier for the seeded legal representative position title.
        code:
          type: string
          description: Stable frontend key for the seeded position title.
          example: INFRASTRUCTURE_DEVOPS
        normalizedCode:
          type: string
          description: Uppercase normalized code used for searches and uniqueness.
          example: INFRASTRUCTURE_DEVOPS
        name:
          type: string
          description: Display value and current string payload accepted by initialLegalRepresentative.positionTitle.
          example: Infrastructure / DevOps
        sortOrder:
          type: integer
          format: int32
          example: 14
    LegalRepresentativeRepresentationTypeCatalogItemResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - sortOrder
      properties:
        publicId:
          type: string
          format: uuid
          description: Stable public identifier for the seeded legal representative representation type.
        code:
          type: string
          description: String enum value that must be sent in initialLegalRepresentative.representationType.
          example: PRIMARYLEGALREPRESENTATIVE
        normalizedCode:
          type: string
          description: Uppercase normalized code used for searches and uniqueness.
          example: PRIMARYLEGALREPRESENTATIVE
        name:
          type: string
          description: Human-readable label for display in the client.
          example: Primary Legal Representative
        sortOrder:
          type: integer
          format: int32
          example: 1
    InitialLegalRepresentativeRequest:
      type: object
      required:
        - firstName
        - lastName
        - documentType
        - documentNumber
        - positionTitle
        - representationType
        - effectiveFromUtc
      properties:
        firstName:
          type: string
          maxLength: 100
          example: Ana
        lastName:
          type: string
          maxLength: 100
          example: Mendoza
        documentType:
          type: string
          example: TAXID
        documentNumber:
          type: string
          maxLength: 80
          example: 0614-290190-102-3
        positionTitle:
          type: string
          maxLength: 150
          example: Representante Legal
        representationType:
          type: string
          example: PRIMARYLEGALREPRESENTATIVE
        authorityDescription:
          type: string
          nullable: true
          maxLength: 500
        appointmentInstrument:
          type: string
          nullable: true
          maxLength: 500
        appointmentDateUtc:
          type: string
          format: date-time
          nullable: true
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        email:
          type: string
          format: email
          nullable: true
          maxLength: 320
        phone:
          type: string
          nullable: true
          maxLength: 40
        isPrimary:
          type: boolean
          nullable: true
          description: Optional. When omitted or null, the legal representative is created without a primary flag.
          example: true
    CompanyTypeMetadataResponse:
      type: object
      required:
        - id
        - code
        - name
        - isActive
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: SA_DE_CV
        name:
          type: string
          example: Sociedad Anonima de Capital Variable
        isActive:
          type: boolean
    CompanyTypeCatalogItemResponse:
      type: object
      required:
        - id
        - code
        - name
        - sortOrder
        - isActive
        - concurrencyToken
        - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
          description: Stable public identifier for the active company type catalog item.
        code:
          type: string
          example: SA_DE_CV
        name:
          type: string
          example: Sociedad Anonima de Capital Variable
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
          format: int32
          example: 10
        isActive:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    ActiveLegalRepresentativeSummaryResponse:
      type: object
      required:
        - publicId
        - fullName
        - representationType
        - positionTitle
      properties:
        publicId:
          type: string
          format: uuid
        fullName:
          type: string
        representationType:
          type: string
          example: PRIMARYLEGALREPRESENTATIVE
        positionTitle:
          type: string
        isPrimary:
          type: boolean
          nullable: true
          description: Null means the onboarding flow did not specify a primary flag.
    AccountCompanyDetailResponse:
      type: object
      required:
        - companyPublicId
        - name
        - slug
        - countryCode
        - status
        - planCode
        - isActiveContext
        - isOwnedByCurrentUser
        - createdAtUtc
        - activeLegalRepresentatives
      properties:
        companyPublicId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        countryCode:
          type: string
        status:
          type: string
          example: Active
        planCode:
          type: string
          example: FREE
        isActiveContext:
          type: boolean
        isOwnedByCurrentUser:
          type: boolean
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
        activeLegalRepresentatives:
          type: array
          items:
            $ref: '#/components/schemas/ActiveLegalRepresentativeSummaryResponse'
        companyType:
          allOf:
            - $ref: '#/components/schemas/CompanyTypeMetadataResponse'
          nullable: true
    CreateAccountCompanyRequest:
      type: object
      required:
        - name
        - countryCode
        - initialLegalRepresentative
      properties:
        name:
          type: string
          maxLength: 150
          example: Acme Services
        countryCode:
          type: string
          maxLength: 3
          description: Country code selected from the authenticated country catalog endpoint.
          example: SV
        companyTypePublicId:
          type: string
          format: uuid
          nullable: true
          description: Optional company type selected from the authenticated country-specific company type catalog endpoint.
        initialLegalRepresentative:
          $ref: '#/components/schemas/InitialLegalRepresentativeRequest'
    CommercialPlanStatus:
      type: string
      enum:
        - Draft
        - Active
        - Inactive
    CommercialPlanLimitInput:
      type: object
      required:
        - code
        - value
      properties:
        code:
          type: string
          maxLength: 80
          example: EMPLOYEES
        value:
          type: number
          format: decimal
          example: 25
    CommercialPlanLimitResponse:
      type: object
      required:
        - code
        - normalizedCode
        - value
      properties:
        code:
          type: string
          example: EMPLOYEES
        normalizedCode:
          type: string
          example: EMPLOYEES
        value:
          type: number
          format: decimal
          example: 25
    CommercialPlanSummaryResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - baseMonthlyFee
        - pricePerActiveEmployee
        - status
        - isSystemPlan
        - createdAtUtc
      properties:
        publicId:
          type: string
          format: uuid
        code:
          type: string
          example: PRO
        normalizedCode:
          type: string
          example: PRO
        name:
          type: string
          example: Professional
        description:
          type: string
          nullable: true
        baseMonthlyFee:
          type: number
          format: decimal
          example: 120.00
        pricePerActiveEmployee:
          type: number
          format: decimal
          example: 3.50
        status:
          $ref: '#/components/schemas/CommercialPlanStatus'
        isSystemPlan:
          type: boolean
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    CommercialPlanResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - baseMonthlyFee
        - pricePerActiveEmployee
        - status
        - isSystemPlan
        - concurrencyToken
        - createdAtUtc
        - limits
      properties:
        publicId:
          type: string
          format: uuid
        code:
          type: string
          example: PRO
        normalizedCode:
          type: string
          example: PRO
        name:
          type: string
          example: Professional
        description:
          type: string
          nullable: true
        baseMonthlyFee:
          type: number
          format: decimal
          example: 120.00
        pricePerActiveEmployee:
          type: number
          format: decimal
          example: 3.50
        status:
          $ref: '#/components/schemas/CommercialPlanStatus'
        isSystemPlan:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
        limits:
          type: array
          items:
            $ref: '#/components/schemas/CommercialPlanLimitResponse'
    CreateCommercialPlanRequest:
      type: object
      required:
        - code
        - name
        - baseMonthlyFee
        - pricePerActiveEmployee
        - status
        - limits
      properties:
        code:
          type: string
          maxLength: 40
          example: PRO
        name:
          type: string
          maxLength: 150
          example: Professional
        description:
          type: string
          nullable: true
          maxLength: 500
        baseMonthlyFee:
          type: number
          format: decimal
          example: 120.00
        pricePerActiveEmployee:
          type: number
          format: decimal
          example: 3.50
        status:
          $ref: '#/components/schemas/CommercialPlanStatus'
        limits:
          type: array
          items:
            $ref: '#/components/schemas/CommercialPlanLimitInput'
    UpdateCommercialPlanRequest:
      type: object
      required:
        - code
        - name
        - baseMonthlyFee
        - pricePerActiveEmployee
        - limits
        - concurrencyToken
      properties:
        code:
          type: string
          maxLength: 40
          example: PRO
        name:
          type: string
          maxLength: 150
          example: Professional Plus
        description:
          type: string
          nullable: true
          maxLength: 500
        baseMonthlyFee:
          type: number
          format: decimal
          example: 180.00
        pricePerActiveEmployee:
          type: number
          format: decimal
          example: 4.00
        limits:
          type: array
          items:
            $ref: '#/components/schemas/CommercialPlanLimitInput'
        concurrencyToken:
          type: string
          format: uuid
    CommercialPlanConcurrencyRequest:
      type: object
      required:
        - concurrencyToken
      properties:
        concurrencyToken:
          type: string
          format: uuid
    PagedCommercialPlanSummaryResponse:
      type: object
      required:
        - items
        - pageNumber
        - pageSize
        - totalCount
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommercialPlanSummaryResponse'
        pageNumber:
          type: integer
          format: int32
          example: 1
        pageSize:
          type: integer
          format: int32
          example: 20
        totalCount:
          type: integer
          format: int32
          example: 2
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
paths:
  /api/account/companies/legal-representative-document-types:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyLegalRepresentativeDocumentTypes
      summary: List legal representative document types for account onboarding
      description: Returns the active catalog entries that should populate the legal representative document type selector before creating a company.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active legal representative document type catalog items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LegalRepresentativeDocumentTypeCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/legal-representative-position-titles:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyLegalRepresentativePositionTitles
      summary: List legal representative position titles for account onboarding
      description: Returns the active catalog entries that should populate the legal representative position title selector before creating a company.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active legal representative position title catalog items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LegalRepresentativePositionTitleCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/legal-representative-representation-types:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyLegalRepresentativeRepresentationTypes
      summary: List legal representative representation types for account onboarding
      description: Returns the active catalog entries that should populate the legal representative representation type selector before creating a company.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active legal representative representation type catalog items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LegalRepresentativeRepresentationTypeCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/countries:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyCountries
      summary: List active country catalog items
      description: Returns the authenticated global country catalog used by the account company creation flow.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active country catalog returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CountryCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/company-types:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyTypes
      summary: List active company types for a selected country
      description: Returns the authenticated global company type catalog filtered by the selected country code.
      security:
        - Bearer: []
      parameters:
        - name: countryCode
          in: query
          required: true
          schema:
            type: string
            maxLength: 3
            example: SV
      responses:
        '200':
          description: Active company type catalog returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompanyTypeCatalogItemResponse'
        '400':
          description: Validation error for the requested country code.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies:
    post:
      tags:
        - account-companies
      operationId: CreateAccountCompany
      summary: Create a company for the authenticated account
      description: Creates a new company, links it to an active country catalog item, provisions the initial tenant data, and accepts an initial legal representative whose primary flag is optional.
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountCompanyRequest'
      responses:
        '201':
          description: Company created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyDetailResponse'
        '400':
          description: Validation error, including country codes not found in the active catalog.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as company limit reached.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/commercial-plans:
    get:
      tags:
        - commercial-plans
      operationId: SearchCommercialPlans
      summary: List global commercial plans
      description: Returns the paged catalog of global commercial plans. Requires an authenticated `platform_admin` user and does not depend on tenant context.
      security:
        - Bearer: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CommercialPlanStatus'
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 150
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paged commercial plan summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCommercialPlanSummaryResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user is not a platform administrator.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
        - commercial-plans
      operationId: CreateCommercialPlan
      summary: Create a global commercial plan
      description: Creates a reusable global commercial plan for future company subscriptions. Requires an authenticated `platform_admin` user and does not depend on tenant context.
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommercialPlanRequest'
      responses:
        '201':
          description: Commercial plan created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialPlanResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user is not a platform administrator.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as duplicated plan code.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/commercial-plans/{publicId}:
    get:
      tags:
        - commercial-plans
      operationId: GetCommercialPlanById
      summary: Get a global commercial plan by public id
      security:
        - Bearer: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Commercial plan detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialPlanResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user is not a platform administrator.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Commercial plan was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      tags:
        - commercial-plans
      operationId: UpdateCommercialPlan
      summary: Update a global commercial plan
      security:
        - Bearer: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommercialPlanRequest'
      responses:
        '200':
          description: Commercial plan updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialPlanResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user is not a platform administrator.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Commercial plan was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as duplicated code, concurrency conflict, or protected system plan mutation.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/commercial-plans/{publicId}/activate:
    patch:
      tags:
        - commercial-plans
      operationId: ActivateCommercialPlan
      summary: Activate a global commercial plan
      security:
        - Bearer: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommercialPlanConcurrencyRequest'
      responses:
        '200':
          description: Commercial plan activated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialPlanResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user is not a platform administrator.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Commercial plan was not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as concurrency conflict or already active state.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
