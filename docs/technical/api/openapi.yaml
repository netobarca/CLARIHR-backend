  '/api/v1/companies/{companyPublicId}/personnel-files/dashboard/movements':
    get:
      tags:
        - Personnel Files
      summary: 'HR analytics dashboard — movements (bajas/altas/neto/rotación/cobertura/liquidaciones) section'
      description: "Activates the bajas and turnover deferred by the base dashboard (RF-010…RF-014). The canonical\nsource of movements is the employee PROFILE, never the actions journal (aclaración №4 / D-03):\nseparations are derived from RetirementDate — a reversal clears it, so a reverted baja leaves the\nseries and ratios — with breakdowns by retirement category and reason; hires are recomputed from\nHireDate with the SAME criterion as dashboard/hires (which is NOT modified); net = altas − bajas per\nmonth; annual turnover = separations ÷ average headcount × 100 (ratePercent null — \"N/D\" — when the\naverage is 0); exit-interview coverage = separations with a completed submission ÷ separations (null\nwith 0 separations); and real settlements grouped by lifecycle status in the period (COUNTS only). NO\nmonetary fields are returned (aclaración №8). Honors the common dimension filters plus the flow month\nfilter (month requires an explicit year → 400 DASHBOARD_MONTH_REQUIRES_YEAR; year defaults to the\ncurrent year). Requires the ViewReports or Read permission (gated in the handler)."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: year
          in: query
          schema:
            type: integer
            format: int32
        - name: month
          in: query
          schema:
            type: integer
            format: int32
        - name: functionalAreaPublicId
          in: query
          schema:
            type: string
            format: uuid
        - name: orgUnitPublicId
          in: query
