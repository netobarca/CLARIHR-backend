  '/api/v1/companies/{companyPublicId}/personnel-files/export':
    get:
      tags:
        - Personnel Files
      summary: Export a company's personnel files (synchronous)
      description: "Streams the filtered personnel files as a file (default `xlsx`, also `csv`) for immediate\ndownload. This synchronous path is capped at the configured synchronous row limit; when the\nfiltered result would exceed it the endpoint responds `413 Payload Too Large`. For larger\nexports submit an asynchronous report export job instead\n(`POST /api/v1/companies/{companyId}/report-export-jobs` with `resourceKey=PERSONNEL_FILES`),\nthen poll `GET /api/v1/report-export-jobs/{jobId}` and download its artifact. Both paths\nshare the same underlying rows and filters; they differ only in row cap and delivery."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          schema:
            type: string
            default: xlsx
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: recordType
          in: query
          schema:
            $ref: '#/components/schemas/PersonnelFileRecordType'
        - name: orgUnitPublicId
          in: query
          schema:
            type: string
            format: uuid
        - name: minAge
          in: query
          schema:
            type: integer
            format: int32
        - name: maxAge
          in: query
          schema:
            type: integer
            format: int32
        - name: maritalStatus
          in: query
          schema:
            type: string
        - name: nationality
          in: query
          schema:
            type: string
        - name: profession
          in: query
          schema:
            type: string
        - name: createdFromUtc
          in: query
          schema:
            type: string
            format: date-time
        - name: createdToUtc
          in: query
          schema:
            type: string
            format: date-time
        - name: q
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortDirection
          in: query
          schema:
            $ref: '#/components/schemas/PersonnelFileSortDirection'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
            text/json:
              schema:
                type: string
                format: binary
