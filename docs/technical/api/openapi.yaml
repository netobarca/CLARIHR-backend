  /api/v1/personnel-files/{publicId}/educations:
    get:
      tags:
      - Personnel Files
      summary: List a personnel file's educations
      description: |-
        Returns every education entry recorded for the specified personnel file.

        Each item carries its own `concurrencyToken`, required in the `If-Match`
        header of subsequent `PUT`/`PATCH`/`DELETE` requests to prevent lost updates.

        **Requires permission:** one of `PersonnelFiles.Read`, `PersonnelFiles.Admin`, `iam.administration.manage`.
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonnelFileEducationResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
      - Personnel Files
      summary: Add an education to a personnel file
      description: |-
        Creates a new education entry under the specified personnel file and returns
        it with a `201 Created` response. The `Location` header points to the created
        resource and the `ETag` header carries its initial `concurrencyToken`.

        **Requires permission:** one of `PersonnelFiles.Admin`, `iam.administration.manage`.
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddEducationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFileEducationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
