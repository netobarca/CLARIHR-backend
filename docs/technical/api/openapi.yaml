components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AcceptCompanyUserInvitationRequest:
      type: object
      required:
      - token
      - password
      properties:
        token:
          type: string
          maxLength: 500
        password:
          type: string
          maxLength: 100
    AccountCompanyAddonChangePreviewResponse:
      type: object
      required:
      - companyPublicId
      - commercialAddonPublicId
      - addonCode
      - addonName
      - action
      - addedModuleKeys
      - removedModuleKeys
      - isEligible
      - ineligibilityReasons
      - warnings
      properties:
        companyPublicId:
          type: string
          format: uuid
        commercialAddonPublicId:
          type: string
          format: uuid
        addonCode:
          type: string
        addonName:
          type: string
        action:
          $ref: '#/components/schemas/SubscriptionAddonChangeAction'
        addedModuleKeys:
          type: array
          items:
            type: string
        removedModuleKeys:
          type: array
          items:
            type: string
        isEligible:
          type: boolean
        ineligibilityReasons:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    AccountCompanyDetailResponse:
      type: object
      required:
      - companyPublicId
      - name
      - slug
      - countryCode
      - status
      - planCode
      - isActiveContext
      - isOwnedByCurrentUser
      - createdAtUtc
      - activeLegalRepresentatives
      properties:
        companyPublicId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        countryCode:
          type: string
        status:
          type: string
          example: Active
        planCode:
          type: string
          example: FREE
        isActiveContext:
          type: boolean
        isOwnedByCurrentUser:
          type: boolean
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
        activeLegalRepresentatives:
          type: array
          items:
            $ref: '#/components/schemas/ActiveLegalRepresentativeSummaryResponse'
        companyType:
          allOf:
          - $ref: '#/components/schemas/CompanyTypeMetadataResponse'
          nullable: true
    AccountCompanyEffectiveModuleResponse:
      type: object
      required:
      - moduleKey
      - displayName
      - description
      - source
      - grantedByPlan
      - grantedByAddon
      properties:
        moduleKey:
          type: string
          example: JOB_PROFILES
        displayName:
          type: string
          example: Job Profiles
        description:
          type: string
        source:
          type: string
          example: plan+addon
        grantedByPlan:
          type: boolean
        grantedByAddon:
          type: boolean
    AccountCompanyMarketplaceAddonResponse:
      type: object
      required:
      - commercialAddonPublicId
      - code
      - normalizedCode
      - name
      - type
      - billingModel
      - measurementUnit
      - unitPrice
      - periodicity
      - moduleCount
      - moduleKeys
      - isOwned
      - canAcquire
      properties:
        commercialAddonPublicId:
          type: string
          format: uuid
        code:
          type: string
        normalizedCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
        unitPrice:
          type: number
          format: decimal
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        moduleCount:
          type: integer
          format: int32
        moduleKeys:
          type: array
          items:
            type: string
        isOwned:
          type: boolean
        canAcquire:
          type: boolean
        blockedReason:
          type: string
          nullable: true
    AccountCompanySubscriptionAddonResponse:
      type: object
      required:
      - companyAddonPublicId
      - commercialAddonPublicId
      - code
      - normalizedCode
      - name
      - type
      - billingModel
      - measurementUnit
      - unitPrice
      - periodicity
      - status
      - moduleCount
      - moduleKeys
      properties:
        companyAddonPublicId:
          type: string
          format: uuid
        commercialAddonPublicId:
          type: string
          format: uuid
        code:
          type: string
        normalizedCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
        unitPrice:
          type: number
          format: decimal
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        status:
          $ref: '#/components/schemas/CompanyAddonStatus'
        moduleCount:
          type: integer
          format: int32
        moduleKeys:
          type: array
          items:
            type: string
    AccountCompanySubscriptionOverviewResponse:
      type: object
      required:
      - companyPublicId
      - companyName
      - companySlug
      - planCode
      - currentPlan
      - activeAddons
      - effectiveModules
      properties:
        companyPublicId:
          type: string
          format: uuid
        companyName:
          type: string
        companySlug:
          type: string
        planCode:
          type: string
          example: FREE
        currentPlan:
          $ref: '#/components/schemas/AccountCompanySubscriptionPlanResponse'
        activeAddons:
          type: array
          items:
            $ref: '#/components/schemas/AccountCompanySubscriptionAddonResponse'
        effectiveModules:
          type: array
          items:
            $ref: '#/components/schemas/AccountCompanyEffectiveModuleResponse'
    AccountCompanySubscriptionPlanPreviewResponse:
      type: object
      required:
      - companyPublicId
      - currentPlan
      - targetPlan
      - addedModuleKeys
      - removedModuleKeys
      - addonDeactivationWarnings
      - isEligible
      - ineligibilityReasons
      properties:
        companyPublicId:
          type: string
          format: uuid
        currentPlan:
          $ref: '#/components/schemas/AccountCompanySubscriptionPlanResponse'
        targetPlan:
          $ref: '#/components/schemas/AccountCompanySubscriptionPlanResponse'
        addedModuleKeys:
          type: array
          items:
            type: string
        removedModuleKeys:
          type: array
          items:
            type: string
        addonDeactivationWarnings:
          type: array
          items:
            type: string
        isEligible:
          type: boolean
        ineligibilityReasons:
          type: array
          items:
            type: string
    AccountCompanySubscriptionPlanResponse:
      type: object
      required:
      - commercialPlanPublicId
      - code
      - normalizedCode
      - name
      - baseMonthlyFee
      - pricePerActiveEmployee
      - currentVersionNumber
      - currencyCode
      - moduleCount
      - moduleKeys
      - isCurrent
      properties:
        commercialPlanPublicId:
          type: string
          format: uuid
        code:
          type: string
          example: FREE
        normalizedCode:
          type: string
          example: FREE
        name:
          type: string
          example: Free
        description:
          type: string
          nullable: true
        baseMonthlyFee:
          type: number
          format: decimal
        pricePerActiveEmployee:
          type: number
          format: decimal
        currentVersionNumber:
          type: integer
          format: int32
        currencyCode:
          type: string
          example: USD
        moduleCount:
          type: integer
          format: int32
        moduleKeys:
          type: array
          items:
            type: string
        isCurrent:
          type: boolean
    ActiveLegalRepresentativeSummaryResponse:
      type: object
      required:
      - publicId
      - fullName
      - representationType
      - positionTitle
      properties:
        publicId:
          type: string
          format: uuid
        fullName:
          type: string
        representationType:
          type: string
          example: PRIMARYLEGALREPRESENTATIVE
        positionTitle:
          type: string
        isPrimary:
