            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
      - Account Companies
      summary: Patch a company (RFC 6902 JSON Patch)
      description: |-
        Applies a partial update using JSON Patch (RFC 6902), media type
        `application/json-patch+json`. Patchable paths: `/name` (max 150 characters, required,
        cannot be removed) and `/companyTypePublicId` (a company-type publicId, or `null`/remove
        to clear it). Status transitions use the dedicated `/archive` and `/reactivate` actions,
        not this patch. Requires the current `concurrencyToken` in the `If-Match` header
        (missing → `400`, stale → `409`). The refreshed token is returned in the body and the
        `ETag` header.
      parameters:
      - name: companyPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json-patch+json:
            schema:
              $ref: '#/components/schemas/JsonPatchDocumentOfPatchAccountCompanyRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AccountCompanyDetailResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyDetailResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyDetailResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
