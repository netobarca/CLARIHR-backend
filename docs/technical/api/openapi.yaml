openapi: 3.0.1
info:
  title: CLARIHR API
  description: Development-time API documentation for CLARIHR.
  version: v1
paths:
  /api/account/companies:
    get:
      tags:
      - Account Companies
      parameters:
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/CompanyStatus'
      - name: page
        in: query
        schema:
          type: integer
          format: int32
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          format: int32
          default: 20
      - name: includeAllowedActions
        in: query
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/PagedResponseOfAccountCompanySummaryResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponseOfAccountCompanySummaryResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/PagedResponseOfAccountCompanySummaryResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
      - Account Companies
      summary: Create a company
      description: |-
        Provisions a new company owned by the authenticated user (with its initial legal
        representative). Returns `201` with the created company; the current `concurrencyToken`
        is included in the body and the `ETag` header for use in a subsequent update.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountCompanyRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateAccountCompanyRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateAccountCompanyRequest'
      responses:
        '201':
          description: Created
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AccountCompanyDetailResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyDetailResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyDetailResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
