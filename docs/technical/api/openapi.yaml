  /api/v1/auth/password-reset/request:
    post:
      tags:
        - Password Reset
      summary: Request a password reset email
      description: "Starts the password-reset flow for a local account. Always responds `202 Accepted`\nregardless of whether the email exists or is eligible — this uniform response prevents\naccount enumeration. When eligible, any active reset tokens are revoked, a new single-use\ntoken is issued and a signed reset link is emailed. A per-account cooldown plus the\n`auth-password-reset-request` rate limit (`429`) throttle abuse."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '202':
          description: Accepted
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          description: Too Many Requests
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
