openapi: 3.0.3
info:
  title: CLARIHR Core API
  version: 0.0-bootstrap
  description: |
    Core API contract (CLARIHR.Api): /api/v1, /api/account, /api/audit, /api/auth. Backoffice/platform endpoints are in openapi-backoffice.yaml.

    Partial hand-maintained OpenAPI supplement for externally relevant core and backoffice
    endpoints that need a checked-in contract before automated export/versioning is introduced.

    The exhaustive contract is still generated at runtime by Swagger in Development
    at /swagger/v1/swagger.json.

    Public API contracts expose `publicId` or `<entity>PublicId`; internal `id` and
    `internalId` never leave the backend. When a resource has business codes, the
    public contract exposes `code` and `normalizedCode`, both normalized to uppercase.

    Core API endpoints require tokens emitted with `client_type=core`. Platform
    backoffice endpoints under `/api/platform/*` require tokens emitted with
    `client_type=platform`.

    All `/api` routes emit `Cache-Control: no-store`, `Pragma: no-cache`, and
    `Expires: 0` to avoid caching sensitive HR or platform responses.
servers:
- url: /
security:
- Bearer: []
tags:
- name: audit
  description: Tenant-scoped audit log list and detail endpoints.
- name: auth
  description: Authentication and session lifecycle.
- name: account-companies
  description: Account-level company creation and tenant activation.
- name: account-company-subscriptions
  description: Owner-facing company subscription, marketplace add-on and effective module management.
- name: bank-catalogs
  description: Global bank catalog administration in backoffice and company-scoped bank lookup in core.
- name: job-and-competency-design
  description: Checked-in supplement for job profile and position slot write contracts with inherited org unit and cost center behavior.
- name: general-catalogs
  description: Company-scoped read-only access to system catalogs resolved by the company's country.
- name: education-catalogs
  description: System-wide education catalog read-only access for Core API authenticated users.
- name: personnel-files
  description: Personnel file lifecycle — create, search, shell and lifecycle transitions.
- name: personnel-file-personal-info
  description: Personnel file personal data, identifications, addresses, emergency contacts and family members.
- name: personnel-file-background
  description: Personnel file background data — educations, languages, trainings, previous employments and references.
- name: personnel-file-interests
  description: Personnel file interests — hobbies, associations and employee relations.
- name: personnel-file-profile
  description: Personnel file financial profile — bank accounts.
- name: report-export-jobs
  description: Asynchronous report export queue, status, cancellation and artifact download endpoints.
- name: files
  description: Provider-agnostic file management — upload sessions, completion, read URLs and deletion.
