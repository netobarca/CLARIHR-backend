        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
      - Job Profiles
      summary: Patch a job catalog item
      description: |-
        Applies a JSON Patch document (RFC 6902, media type
        `application/json-patch+json`) to the `code`, `name` or `isActive`
        fields of an existing job catalog item. Requires the `If-Match`
        header with the current `concurrencyToken`. The new token is
        returned in the `ETag` header.

        System items cannot be modified and the `code` must remain unique
        within the category.

        **Requires permission:** one of `JobCatalogs.Admin`, `iam.administration.manage`.
      parameters:
      - name: companyPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/JobCatalogCategory'
      - name: jobCatalogPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json-patch+json:
            schema:
              $ref: '#/components/schemas/JsonPatchDocumentOfUpdateJobCatalogItemRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/JsonPatchDocumentOfUpdateJobCatalogItemRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCatalogItemResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    delete:
      tags:
      - Job Profiles
      summary: Remove a job catalog item from a category
      description: |-
        Deletes the specified job catalog item. Requires the `If-Match`
        header with the current `concurrencyToken`. System items are
        rejected, and an item still referenced by existing job profiles
        cannot be deleted (a usage check is enforced).

        **Requires permission:** one of `JobCatalogs.Admin`, `iam.administration.manage`.
      parameters:
      - name: companyPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/JobCatalogCategory'
      - name: jobCatalogPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
