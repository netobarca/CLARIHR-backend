openapi: 3.0.3
info:
  title: CLARIHR API
  version: 0.0-bootstrap
  description: |
    Partial hand-maintained OpenAPI supplement for externally relevant endpoints that need
    a checked-in contract before automated export/versioning is introduced.

    The exhaustive contract is still generated at runtime by Swagger in Development
    at /swagger/v1/swagger.json.
servers:
  - url: /
security:
  - Bearer: []
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LegalRepresentativeDocumentTypeCatalogItemResponse:
      type: object
      required:
        - id
        - code
        - name
        - sortOrder
      properties:
        id:
          type: integer
          format: int32
          description: Numeric value aligned with the current LegalRepresentativeDocumentType enum.
          example: 1
        code:
          type: string
          description: String enum value that must be sent in initialLegalRepresentative.documentType.
          example: NationalId
        name:
          type: string
          description: Human-readable label for display in the client.
          example: National ID
        sortOrder:
          type: integer
          format: int32
          example: 1
    LegalRepresentativePositionTitleCatalogItemResponse:
      type: object
      required:
        - id
        - code
        - name
        - sortOrder
      properties:
        id:
          type: integer
          format: int32
          description: Stable numeric identifier for the seeded legal representative position title.
          example: 14
        code:
          type: string
          description: Stable frontend key for the seeded position title.
          example: INFRASTRUCTURE_DEVOPS
        name:
          type: string
          description: Display value and current string payload accepted by initialLegalRepresentative.positionTitle.
          example: Infrastructure / DevOps
        sortOrder:
          type: integer
          format: int32
          example: 14
    LegalRepresentativeRepresentationTypeCatalogItemResponse:
      type: object
      required:
        - id
        - code
        - name
        - sortOrder
      properties:
        id:
          type: integer
          format: int32
          description: Numeric value aligned with the current LegalRepresentativeRepresentationType enum.
          example: 1
        code:
          type: string
          description: String enum value that must be sent in initialLegalRepresentative.representationType.
          example: PrimaryLegalRepresentative
        name:
          type: string
          description: Human-readable label for display in the client.
          example: Primary Legal Representative
        sortOrder:
          type: integer
          format: int32
          example: 1
    InitialLegalRepresentativeRequest:
      type: object
      required:
        - firstName
        - lastName
        - documentType
        - documentNumber
        - positionTitle
        - representationType
        - effectiveFromUtc
      properties:
        firstName:
          type: string
          maxLength: 100
          example: Ana
        lastName:
          type: string
          maxLength: 100
          example: Mendoza
        documentType:
          type: string
          example: TaxId
        documentNumber:
          type: string
          maxLength: 80
          example: 0614-290190-102-3
        positionTitle:
          type: string
          maxLength: 150
          example: Representante Legal
        representationType:
          type: string
          example: PrimaryLegalRepresentative
        authorityDescription:
          type: string
          nullable: true
          maxLength: 500
        appointmentInstrument:
          type: string
          nullable: true
          maxLength: 500
        appointmentDateUtc:
          type: string
          format: date-time
          nullable: true
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        email:
          type: string
          format: email
          nullable: true
          maxLength: 320
        phone:
          type: string
          nullable: true
          maxLength: 40
        isPrimary:
          type: boolean
          nullable: true
          description: Optional. When omitted or null, the legal representative is created without a primary flag.
          example: true
    CompanyTypeMetadataResponse:
      type: object
      required:
        - id
        - code
        - name
        - isActive
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        isActive:
          type: boolean
    ActiveLegalRepresentativeSummaryResponse:
      type: object
      required:
        - id
        - fullName
        - representationType
        - positionTitle
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        representationType:
          type: string
          example: PrimaryLegalRepresentative
        positionTitle:
          type: string
        isPrimary:
          type: boolean
          nullable: true
          description: Null means the onboarding flow did not specify a primary flag.
    AccountCompanyDetailResponse:
      type: object
      required:
        - companyId
        - name
        - slug
        - countryCode
        - status
        - planCode
        - isActiveContext
        - isOwnedByCurrentUser
        - createdAtUtc
        - activeLegalRepresentatives
      properties:
        companyId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        countryCode:
          type: string
        status:
          type: string
          example: Active
        planCode:
          type: string
          example: FREE
        isActiveContext:
          type: boolean
        isOwnedByCurrentUser:
          type: boolean
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
        activeLegalRepresentatives:
          type: array
          items:
            $ref: '#/components/schemas/ActiveLegalRepresentativeSummaryResponse'
        companyType:
          allOf:
            - $ref: '#/components/schemas/CompanyTypeMetadataResponse'
          nullable: true
    CreateAccountCompanyRequest:
      type: object
      required:
        - name
        - countryCode
        - initialLegalRepresentative
      properties:
        name:
          type: string
          maxLength: 150
          example: Acme Services
        countryCode:
          type: string
          maxLength: 3
          example: SV
        companyTypeId:
          type: string
          format: uuid
          nullable: true
        initialLegalRepresentative:
          $ref: '#/components/schemas/InitialLegalRepresentativeRequest'
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
paths:
  /api/account/companies/legal-representative-document-types:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyLegalRepresentativeDocumentTypes
      summary: List legal representative document types for account onboarding
      description: Returns the active catalog entries that should populate the legal representative document type selector before creating a company.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active legal representative document type catalog items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LegalRepresentativeDocumentTypeCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/legal-representative-position-titles:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyLegalRepresentativePositionTitles
      summary: List legal representative position titles for account onboarding
      description: Returns the active catalog entries that should populate the legal representative position title selector before creating a company.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active legal representative position title catalog items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LegalRepresentativePositionTitleCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies/legal-representative-representation-types:
    get:
      tags:
        - account-companies
      operationId: GetAccountCompanyLegalRepresentativeRepresentationTypes
      summary: List legal representative representation types for account onboarding
      description: Returns the active catalog entries that should populate the legal representative representation type selector before creating a company.
      security:
        - Bearer: []
      responses:
        '200':
          description: Active legal representative representation type catalog items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LegalRepresentativeRepresentationTypeCatalogItemResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/account/companies:
    post:
      tags:
        - account-companies
      operationId: CreateAccountCompany
      summary: Create a company for the authenticated account
      description: Creates a new company, provisions the initial tenant data, and accepts an initial legal representative whose primary flag is optional.
      security:
        - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountCompanyRequest'
      responses:
        '201':
          description: Company created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyDetailResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as company limit reached.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
tags:
  - name: auth
    description: Authentication and session lifecycle.
  - name: account-companies
    description: Account-level company creation and tenant activation.
  - name: personnel-files
    description: Personnel file lifecycle and subsections.
x-documentation-status: partial-manual-supplement
x-runtime-openapi-source: /swagger/v1/swagger.json
