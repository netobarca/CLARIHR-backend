  /api/v1/personnel-files/{publicId}/position-hierarchy:
    get:
      tags:
      - personnel-files
      operationId: GetPersonnelFilePositionHierarchy
      summary: Get a personnel file's position hierarchy
      description: Returns the read-only position hierarchy (reporting line and subordinates) computed for the specified personnel file's assigned position.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Position hierarchy returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFilePositionHierarchyResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Permission denied or tenant mismatch.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Personnel file not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Business-rule violation, such as requesting the hierarchy for a file without an assigned position.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/companies/{companyPublicId}/personnel-files/dynamic-query:
    post:
      tags:
      - personnel-files
      operationId: DynamicQueryPersonnelFiles
      summary: Run a dynamic query over a company's personnel files
      description: Read-only search and aggregation over a company's personnel files (arbitrary field filters, grouping, sorting, free-text q and pagination). Requires read permission only; it never mutates. For downloads use the export endpoint (small result sets) or an asynchronous report export job (large result sets).
      security:
