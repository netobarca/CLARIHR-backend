        '409':
          description: Business conflict such as stale patched concurrency token, duplicate code, dependency cycle or editing an archived profile.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Business-rule violation such as publish requirements or invalid compensation tabulator line coverage.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '413':
          description: Patch request body exceeds the 64 KiB limit.
