openapi: 3.0.3
info:
  title: CLARIHR APIs
  version: 0.0-bootstrap
  description: |
    Partial hand-maintained OpenAPI supplement for externally relevant core and backoffice
    endpoints that need a checked-in contract before automated export/versioning is introduced.

    The exhaustive contract is still generated at runtime by Swagger in Development
    at /swagger/v1/swagger.json.

    Public API contracts expose `publicId` or `<entity>PublicId`; internal `id` and
    `internalId` never leave the backend. When a resource has business codes, the
    public contract exposes `code` and `normalizedCode`, both normalized to uppercase.

    Core API endpoints require tokens emitted with `client_type=core`. Platform
    backoffice endpoints under `/api/platform/*` require tokens emitted with
    `client_type=platform`.
servers:
  - url: /
security:
  - Bearer: []
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CountryCatalogItemResponse:
      type: object
      required:
        - id
        - code
        - name
        - sortOrder
      properties:
        id:
          type: string
          format: uuid
          description: Stable public identifier for the active country catalog item.
        code:
          type: string
          maxLength: 2
          description: ISO-style country code that must be sent in CreateAccountCompanyRequest.countryCode.
          example: SV
        name:
          type: string
          description: Human-readable country name for display in the client.
          example: El Salvador
        sortOrder:
          type: integer
          format: int32
          example: 69
    LegalRepresentativeDocumentTypeCatalogItemResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - sortOrder
      properties:
        publicId:
          type: string
          format: uuid
          description: Stable public identifier for the seeded legal representative document type.
        code:
          type: string
          description: String enum value that must be sent in initialLegalRepresentative.documentType.
          example: TAXID
        normalizedCode:
          type: string
          description: Uppercase normalized code used for searches and uniqueness.
          example: TAXID
        name:
          type: string
          description: Human-readable label for display in the client.
          example: Tax ID
        sortOrder:
          type: integer
          format: int32
          example: 1
    LegalRepresentativePositionTitleCatalogItemResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - sortOrder
      properties:
        publicId:
          type: string
          format: uuid
          description: Stable public identifier for the seeded legal representative position title.
        code:
          type: string
          description: Stable frontend key for the seeded position title.
          example: INFRASTRUCTURE_DEVOPS
        normalizedCode:
          type: string
          description: Uppercase normalized code used for searches and uniqueness.
          example: INFRASTRUCTURE_DEVOPS
        name:
          type: string
          description: Display value and current string payload accepted by initialLegalRepresentative.positionTitle.
          example: Infrastructure / DevOps
        sortOrder:
          type: integer
          format: int32
          example: 14
    LegalRepresentativeRepresentationTypeCatalogItemResponse:
      type: object
      required:
        - publicId
        - code
        - normalizedCode
        - name
        - sortOrder
      properties:
        publicId:
          type: string
          format: uuid
          description: Stable public identifier for the seeded legal representative representation type.
        code:
          type: string
          description: String enum value that must be sent in initialLegalRepresentative.representationType.
          example: PRIMARYLEGALREPRESENTATIVE
        normalizedCode:
          type: string
          description: Uppercase normalized code used for searches and uniqueness.
          example: PRIMARYLEGALREPRESENTATIVE
        name:
          type: string
          description: Human-readable label for display in the client.
          example: Primary Legal Representative
        sortOrder:
          type: integer
          format: int32
          example: 1
    InitialLegalRepresentativeRequest:
      type: object
      required:
        - firstName
        - lastName
        - documentType
        - documentNumber
        - positionTitle
        - representationType
        - effectiveFromUtc
      properties:
        firstName:
          type: string
          maxLength: 100
          example: Ana
        lastName:
          type: string
          maxLength: 100
          example: Mendoza
        documentType:
          type: string
          example: TAXID
        documentNumber:
          type: string
          maxLength: 80
          example: 0614-290190-102-3
        positionTitle:
          type: string
          maxLength: 150
          example: Representante Legal
        representationType:
          type: string
          example: PRIMARYLEGALREPRESENTATIVE
        authorityDescription:
          type: string
          nullable: true
          maxLength: 500
        appointmentInstrument:
          type: string
          nullable: true
          maxLength: 500
        appointmentDateUtc:
          type: string
          format: date-time
          nullable: true
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        email:
          type: string
          format: email
          nullable: true
          maxLength: 320
        phone:
          type: string
          nullable: true
          maxLength: 40
        isPrimary:
          type: boolean
          nullable: true
          description: Optional. When omitted or null, the legal representative is created without a primary flag.
          example: true
    CompanyTypeMetadataResponse:
      type: object
      required:
        - id
        - code
        - name
        - isActive
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: SA_DE_CV
        name:
          type: string
          example: Sociedad Anonima de Capital Variable
        isActive:
          type: boolean
    CompanyTypeCatalogItemResponse:
      type: object
      required:
        - id
        - code
        - name
        - sortOrder
        - isActive
        - concurrencyToken
        - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
          description: Stable public identifier for the active company type catalog item.
        code:
          type: string
          example: SA_DE_CV
        name:
          type: string
          example: Sociedad Anonima de Capital Variable
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
          format: int32
          example: 10
        isActive:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    ActiveLegalRepresentativeSummaryResponse:
      type: object
      required:
        - publicId
        - fullName
        - representationType
        - positionTitle
      properties:
        publicId:
          type: string
          format: uuid
        fullName:
          type: string
        representationType:
          type: string
          example: PRIMARYLEGALREPRESENTATIVE
        positionTitle:
          type: string
        isPrimary:
          type: boolean
          nullable: true
          description: Null means the onboarding flow did not specify a primary flag.
    AccountCompanyDetailResponse:
      type: object
      required:
        - companyPublicId
        - name
        - slug
        - countryCode
        - status
        - planCode
        - isActiveContext
        - isOwnedByCurrentUser
        - createdAtUtc
        - activeLegalRepresentatives
      properties:
        companyPublicId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        countryCode:
          type: string
        status:
          type: string
          example: Active
        planCode:
          type: string
          example: FREE
        isActiveContext:
          type: boolean
        isOwnedByCurrentUser:
          type: boolean
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
        activeLegalRepresentatives:
          type: array
          items:
            $ref: '#/components/schemas/ActiveLegalRepresentativeSummaryResponse'
        companyType:
          allOf:
            - $ref: '#/components/schemas/CompanyTypeMetadataResponse'
          nullable: true
    AccountCompanyEffectiveModuleResponse:
      type: object
      required:
        - moduleKey
        - displayName
        - description
        - source
        - grantedByPlan
        - grantedByAddon
      properties:
        moduleKey:
          type: string
          example: JOB_PROFILES
        displayName:
          type: string
          example: Job Profiles
        description:
          type: string
        source:
          type: string
          example: plan+addon
        grantedByPlan:
          type: boolean
        grantedByAddon:
          type: boolean
    AccountCompanySubscriptionPlanResponse:
      type: object
      required:
        - commercialPlanPublicId
        - code
        - normalizedCode
        - name
        - baseMonthlyFee
        - pricePerActiveEmployee
        - currentVersionNumber
        - currencyCode
        - moduleCount
        - moduleKeys
        - isCurrent
      properties:
        commercialPlanPublicId:
          type: string
          format: uuid
        code:
          type: string
          example: FREE
        normalizedCode:
          type: string
          example: FREE
        name:
          type: string
          example: Free
        description:
          type: string
          nullable: true
        baseMonthlyFee:
          type: number
          format: decimal
        pricePerActiveEmployee:
          type: number
          format: decimal
        currentVersionNumber:
          type: integer
          format: int32
        currencyCode:
          type: string
          example: USD
        moduleCount:
          type: integer
          format: int32
        moduleKeys:
          type: array
          items:
            type: string
        isCurrent:
          type: boolean
    AccountCompanySubscriptionAddonResponse:
      type: object
      required:
        - companyAddonPublicId
        - commercialAddonPublicId
        - code
        - normalizedCode
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - periodicity
        - status
        - moduleCount
        - moduleKeys
      properties:
        companyAddonPublicId:
          type: string
          format: uuid
        commercialAddonPublicId:
          type: string
          format: uuid
        code:
          type: string
        normalizedCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
        unitPrice:
          type: number
          format: decimal
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        status:
          $ref: '#/components/schemas/CompanyAddonStatus'
        moduleCount:
          type: integer
          format: int32
        moduleKeys:
          type: array
          items:
            type: string
    AccountCompanySubscriptionOverviewResponse:
      type: object
      required:
        - companyPublicId
        - companyName
        - companySlug
        - planCode
        - currentPlan
        - activeAddons
        - effectiveModules
      properties:
        companyPublicId:
          type: string
          format: uuid
        companyName:
          type: string
        companySlug:
          type: string
        planCode:
          type: string
          example: FREE
        currentPlan:
          $ref: '#/components/schemas/AccountCompanySubscriptionPlanResponse'
        activeAddons:
          type: array
          items:
            $ref: '#/components/schemas/AccountCompanySubscriptionAddonResponse'
        effectiveModules:
          type: array
          items:
            $ref: '#/components/schemas/AccountCompanyEffectiveModuleResponse'
    AccountCompanySubscriptionPlanPreviewResponse:
      type: object
      required:
        - companyPublicId
        - currentPlan
        - targetPlan
        - addedModuleKeys
        - removedModuleKeys
        - addonDeactivationWarnings
        - isEligible
        - ineligibilityReasons
      properties:
        companyPublicId:
          type: string
          format: uuid
        currentPlan:
          $ref: '#/components/schemas/AccountCompanySubscriptionPlanResponse'
        targetPlan:
          $ref: '#/components/schemas/AccountCompanySubscriptionPlanResponse'
        addedModuleKeys:
          type: array
          items:
            type: string
        removedModuleKeys:
          type: array
          items:
            type: string
        addonDeactivationWarnings:
          type: array
          items:
            type: string
        isEligible:
          type: boolean
        ineligibilityReasons:
          type: array
          items:
            type: string
    AccountCompanyMarketplaceAddonResponse:
      type: object
      required:
        - commercialAddonPublicId
        - code
        - normalizedCode
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - periodicity
        - moduleCount
        - moduleKeys
        - isOwned
        - canAcquire
      properties:
        commercialAddonPublicId:
          type: string
          format: uuid
        code:
          type: string
        normalizedCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
        unitPrice:
          type: number
          format: decimal
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        moduleCount:
          type: integer
          format: int32
        moduleKeys:
          type: array
          items:
            type: string
        isOwned:
          type: boolean
        canAcquire:
          type: boolean
        blockedReason:
          type: string
          nullable: true
    AccountCompanyAddonChangePreviewResponse:
      type: object
      required:
        - companyPublicId
        - commercialAddonPublicId
        - addonCode
        - addonName
        - action
        - addedModuleKeys
        - removedModuleKeys
        - isEligible
        - ineligibilityReasons
        - warnings
      properties:
        companyPublicId:
          type: string
          format: uuid
        commercialAddonPublicId:
          type: string
          format: uuid
        addonCode:
          type: string
        addonName:
          type: string
        action:
          $ref: '#/components/schemas/SubscriptionAddonChangeAction'
        addedModuleKeys:
          type: array
          items:
            type: string
        removedModuleKeys:
          type: array
          items:
            type: string
        isEligible:
          type: boolean
        ineligibilityReasons:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    PreviewOwnedCompanySubscriptionRequest:
      type: object
      required:
        - commercialPlanPublicId
      properties:
        commercialPlanPublicId:
          type: string
          format: uuid
    ChangeOwnedCompanySubscriptionRequest:
      type: object
      required:
        - commercialPlanPublicId
      properties:
        commercialPlanPublicId:
          type: string
          format: uuid
        observations:
          type: string
          nullable: true
          maxLength: 2000
    PreviewOwnedCompanyAddonRequest:
      type: object
      required:
        - commercialAddonPublicId
        - action
      properties:
        commercialAddonPublicId:
          type: string
          format: uuid
        action:
          $ref: '#/components/schemas/SubscriptionAddonChangeAction'
    ChangeOwnedCompanyAddonRequest:
      type: object
      required:
        - commercialAddonPublicId
        - action
      properties:
        commercialAddonPublicId:
          type: string
          format: uuid
        action:
          $ref: '#/components/schemas/SubscriptionAddonChangeAction'
        observations:
          type: string
          nullable: true
          maxLength: 2000
    CommercialModuleResponse:
      type: object
      required:
        - key
        - displayName
        - description
      properties:
        key:
          type: string
          example: JOB_PROFILES
        displayName:
          type: string
          example: Job Profiles
        description:
          type: string
    CreateAccountCompanyRequest:
      type: object
      required:
        - name
        - countryCode
        - initialLegalRepresentative
      properties:
        name:
          type: string
          maxLength: 150
          example: Acme Services
        countryCode:
          type: string
          maxLength: 3
          description: Country code selected from the authenticated country catalog endpoint.
          example: SV
        companyTypePublicId:
          type: string
          format: uuid
          nullable: true
          description: Optional company type selected from the authenticated country-specific company type catalog endpoint.
        initialLegalRepresentative:
          $ref: '#/components/schemas/InitialLegalRepresentativeRequest'
    AuthProvider:
      type: string
      enum:
        - Local
        - Google
        - Microsoft
        - Apple
    UserDto:
      type: object
      required:
        - publicId
        - email
        - firstName
        - lastName
        - authProvider
      properties:
        publicId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        authProvider:
          $ref: '#/components/schemas/AuthProvider'
    AuthResponse:
      type: object
      required:
        - accessToken
        - expiresIn
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          nullable: true
        expiresIn:
          type: integer
          format: int32
        user:
          $ref: '#/components/schemas/UserDto'
    PlatformLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          maxLength: 100
    PlatformRefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          maxLength: 2048
    CommercialPlanStatus:
      type: string
      enum:
        - Draft
        - Active
        - Inactive
    CommercialAddonType:
      type: string
      enum:
        - Massive
        - Specialized
    CommercialAddonBillingModel:
      type: string
      enum:
        - PerActiveEmployee
        - PerSeat
        - PerVolume
    CommercialAddonPeriodicity:
      type: string
      enum:
        - Monthly
        - Annual
    CommercialAddonStatus:
      type: string
      enum:
        - Draft
        - Active
        - Inactive
    SubscriptionStatus:
      type: string
      enum:
        - Draft
        - Scheduled
        - Trial
        - Active
        - Suspended
        - Cancelled
        - Expired
    SubscriptionStatusChangeOrigin:
      type: string
      enum:
        - PlatformOperator
        - SystemProcess
    SubscriptionStatusChangeReasonCode:
      type: string
      enum:
        - InitialAssignment
        - ManualActivation
        - ActivationScheduled
        - ScheduledStartReached
        - TrialEnded
        - ExpirationReached
        - ManualSuspension
        - PaymentDelinquency
        - CustomerRequest
        - CommercialCancellation
        - AuthorizedReactivation
        - SubscriptionReplacement
        - LegacyMigration
    CommercialAddonSummaryResponse:
      type: object
      required:
        - publicId
        - code
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - periodicity
        - status
        - moduleCount
        - createdAtUtc
      properties:
        publicId:
          type: string
          format: uuid
        code:
          type: string
          example: ADDON-RECRUITING
        name:
          type: string
          example: Recruiting ATS
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
          example: recruiter seat
        unitPrice:
          type: number
          format: decimal
          example: 12.50
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
          example: 2
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
          example: 35.00
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        status:
          $ref: '#/components/schemas/CommercialAddonStatus'
        moduleCount:
          type: integer
          format: int32
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    CommercialAddonResponse:
      type: object
      required:
        - publicId
        - code
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - periodicity
        - status
        - moduleCount
        - moduleKeys
        - concurrencyToken
        - createdAtUtc
      properties:
        publicId:
          type: string
          format: uuid
        code:
          type: string
          example: ADDON-RECRUITING
        name:
          type: string
          example: Recruiting ATS
        description:
          type: string
          nullable: true
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
          example: recruiter seat
        unitPrice:
          type: number
          format: decimal
          example: 12.50
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
          example: 2
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
          example: 35.00
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        status:
          $ref: '#/components/schemas/CommercialAddonStatus'
        moduleCount:
          type: integer
          format: int32
        moduleKeys:
          type: array
          items:
            type: string
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
    CreateCommercialAddonRequest:
      type: object
      required:
        - code
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - moduleKeys
        - periodicity
        - status
      properties:
        code:
          type: string
          maxLength: 40
          example: ADDON-ATTENDANCE
        name:
          type: string
          maxLength: 150
          example: Attendance
        description:
          type: string
          nullable: true
          maxLength: 500
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
          maxLength: 80
          example: recruiter seat
        unitPrice:
          type: number
          format: decimal
          example: 12.50
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
          example: 2
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
          example: 35.00
        moduleKeys:
          type: array
          items:
            type: string
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        status:
          $ref: '#/components/schemas/CommercialAddonStatus'
    UpdateCommercialAddonRequest:
      type: object
      required:
        - code
        - name
        - type
        - billingModel
        - measurementUnit
        - unitPrice
        - moduleKeys
        - periodicity
        - concurrencyToken
      properties:
        code:
          type: string
          maxLength: 40
          example: ADDON-ATTENDANCE
        name:
          type: string
          maxLength: 150
          example: Attendance Plus
        description:
          type: string
          nullable: true
          maxLength: 500
        type:
          $ref: '#/components/schemas/CommercialAddonType'
        billingModel:
          $ref: '#/components/schemas/CommercialAddonBillingModel'
        measurementUnit:
          type: string
          maxLength: 80
          example: vacante
        unitPrice:
          type: number
          format: decimal
          example: 1.50
        minimumQuantity:
          type: integer
          format: int32
          nullable: true
        minimumMonthlyFee:
          type: number
          format: decimal
          nullable: true
        moduleKeys:
          type: array
          items:
            type: string
        periodicity:
          $ref: '#/components/schemas/CommercialAddonPeriodicity'
        concurrencyToken:
          type: string
          format: uuid
    CommercialAddonConcurrencyRequest:
      type: object
      required:
        - concurrencyToken
      properties:
        concurrencyToken:
          type: string
          format: uuid
    PagedCommercialAddonSummaryResponse:
      type: object
      required:
        - items
        - pageNumber
        - pageSize
        - totalCount
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommercialAddonSummaryResponse'
        pageNumber:
          type: integer
          format: int32
          example: 1
        pageSize:
          type: integer
          format: int32
          example: 20
        totalCount:
          type: integer
          format: int32
          example: 2
    CommercialPlanLimitInput:
      type: object
      required:
        - code
        - value
      properties:
        code:
          type: string
          maxLength: 80
          example: EMPLOYEES
        value:
          type: number
          format: decimal
          example: 25
    CommercialPlanLimitResponse:
      type: object
      required:
