        description: When omitted, defaults to true. Set false to skip account-provisioning checks in preview.
        schema:
          type: boolean
      responses:
        '200':
          description: Finalization readiness evaluated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizePersonnelFilePreviewResponse'
        '400':
          description: Validation error, such as invalid query parameter format.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have permission to manage personnel files or the tenant scope does not match.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The personnel file was not found in the tenant scope.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/companies/{companyId}/job-catalogs/{category}:
    get:
      tags:
      - job-and-competency-design
      operationId: SearchJobCatalogItems
      summary: Search job catalog items
      description: Returns paged tenant-scoped catalog items for a job catalog category.
      security:
      - Bearer: []
      parameters:
      - name: companyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/JobCatalogCategory'
      - name: isActive
        in: query
        schema:
          type: boolean
      - name: q
        in: query
        schema:
          type: string
          maxLength: 150
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          default: 20
          maximum: 100
      - name: includeAllowedActions
        in: query
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Paged job catalog items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedJobCatalogItemResponse'
        '400':
          description: Validation error.
        '401':
          description: Authentication is required.
        '403':
          description: Missing permission or tenant mismatch.
    post:
      tags:
      - job-and-competency-design
      operationId: CreateJobCatalogItem
      summary: Create a job catalog item
      description: Creates one tenant-scoped job catalog item.
      security:
      - Bearer: []
      parameters:
      - name: companyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/JobCatalogCategory'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobCatalogItemRequest'
      responses:
        '201':
          description: Job catalog item created successfully.
          headers:
            ETag:
              description: New item concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCatalogItemResponse'
        '400':
          description: Validation error.
        '401':
          description: Authentication is required.
        '403':
          description: Missing permission or tenant mismatch.
        '409':
          description: Duplicate catalog code.
  /api/v1/companies/{companyId}/job-catalogs/{category}/{jobCatalogPublicId}:
    put:
      tags:
      - job-and-competency-design
      operationId: UpdateJobCatalogItem
      summary: Replace a job catalog item
      description: Replaces one job catalog item. Optimistic concurrency is supplied through `If-Match`, not the body.
      security:
      - Bearer: []
      parameters:
      - name: companyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/JobCatalogCategory'
      - name: jobCatalogPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        required: true
        description: Current item `concurrencyToken`, preferably quoted as an HTTP ETag.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJobCatalogItemRequest'
      responses:
        '200':
          description: Job catalog item updated successfully.
          headers:
            ETag:
              description: New item concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCatalogItemResponse'
        '400':
          description: Validation error or missing/invalid `If-Match`.
        '401':
          description: Authentication is required.
        '403':
          description: Missing permission or tenant mismatch.
        '404':
          description: Catalog item not found.
        '409':
          description: Concurrency conflict, duplicate code, immutable system item or item in use.
    patch:
      tags:
      - job-and-competency-design
      operationId: PatchJobCatalogItem
      summary: Patch a job catalog item
      description: Applies JSON Patch to `/code`, `/name` or `/isActive`. Optimistic concurrency is supplied through `If-Match`; `/concurrencyToken` is not part of the patch contract. The patch document is limited to 50 operations and the request body is capped at 64 KiB.
      security:
      - Bearer: []
      parameters:
      - name: companyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/JobCatalogCategory'
      - name: jobCatalogPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        required: true
        description: Current item `concurrencyToken`, preferably quoted as an HTTP ETag.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              maxItems: 50
              items:
                $ref: '#/components/schemas/JsonPatchOperation'
      responses:
        '200':
          description: Job catalog item patched successfully.
          headers:
            ETag:
              description: New item concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCatalogItemResponse'
        '400':
          description: Invalid JSON Patch document or missing/invalid `If-Match`.
        '401':
          description: Authentication is required.
        '403':
          description: Missing permission or tenant mismatch.
        '404':
          description: Catalog item not found.
