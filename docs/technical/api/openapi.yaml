        status:
          $ref: '#/components/schemas/PositionSlotStatus'
        maxEmployees:
          type: integer
          format: int32
          minimum: 1
        occupiedEmployees:
          type: integer
          format: int32
          minimum: 0
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 2000
    PositionSlotUpdateRequest:
      type: object
      required:
        - code
        - jobProfilePublicId
        - maxEmployees
        - effectiveFromUtc
        - concurrencyToken
      properties:
        code:
          type: string
          maxLength: 50
          example: PS-FIN-001
        title:
          type: string
          nullable: true
          maxLength: 180
        jobProfilePublicId:
          type: string
          format: uuid
          description: The linked job profile. Updating it changes the derived `OrgUnit` and `CostCenterCode` exposed by the slot.
        workCenterPublicId:
          type: string
          format: uuid
          nullable: true
        maxEmployees:
          type: integer
          format: int32
          minimum: 1
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 2000
        concurrencyToken:
          type: string
          format: uuid
    PositionSlotContractResponse:
      type: object
      description: Partial checked-in contract for position slot create/update responses. `orgUnitId`, `orgUnitName` and `costCenterCode` are inferred from the linked job profile.
      required:
        - id
        - companyId
        - code
        - status
        - jobProfileId
        - jobProfileCode
        - jobProfileTitle
        - orgUnitId
        - orgUnitName
        - maxEmployees
        - occupiedEmployees
        - effectiveFromUtc
        - isActive
        - concurrencyToken
        - createdAtUtc
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PositionSlotStatus'
        jobProfileId:
          type: string
          format: uuid
        jobProfileCode:
          type: string
        jobProfileTitle:
          type: string
        orgUnitId:
          type: string
          format: uuid
        orgUnitName:
          type: string
        workCenterId:
          type: string
          format: uuid
          nullable: true
        workCenterName:
          type: string
          nullable: true
        costCenterCode:
          type: string
          nullable: true
          description: Derived from `jobProfile.orgUnit.costCenterCode`.
        maxEmployees:
          type: integer
          format: int32
        occupiedEmployees:
          type: integer
          format: int32
        effectiveFromUtc:
          type: string
          format: date-time
        effectiveToUtc:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
        concurrencyToken:
          type: string
          format: uuid
        createdAtUtc:
          type: string
          format: date-time
        modifiedAtUtc:
          type: string
          format: date-time
          nullable: true
paths:
  /api/audit/logs:
    get:
      tags:
        - audit
      operationId: ListAuditLogs
      summary: List tenant audit logs
      description: Returns a paged audit log list scoped to the active tenant. `totalCount` is computed after applying every server-side filter, including `EntityPublicId`.
      security:
        - Bearer: []
      parameters:
        - name: fromUtc
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: toUtc
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: ActorUserPublicId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: EntityPublicId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Public identifier of the audited subject entity. This follows the backend public contract standard; `EntityId` is not part of the public API.
        - name: entityType
          in: query
          required: false
          schema:
            type: string
          description: Canonical audit entity type such as `User`, `Role`, `JobProfile` or `OrgUnit`.
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paged tenant audit log list after applying all filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAuditLogSummaryResponse'
        '400':
          description: Validation error, such as an empty GUID or an unknown audit catalog value.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have audit log read access.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/audit/logs/{publicId}:
    get:
      tags:
        - audit
      operationId: GetAuditLogByPublicId
      summary: Get tenant audit log detail
      description: Returns the complete audit log detail for a single public identifier in the active tenant.
      security:
        - Bearer: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Audit log detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogDetailResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The audit log belongs to another tenant or the user lacks permission.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Audit log not found in the active tenant.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
