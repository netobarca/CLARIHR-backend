      - code
      - normalizedCode
      - name
      - type
      - billingModel
      - measurementUnit
      - unitPrice
      - periodicity
      - status
      - moduleCount
      - moduleKeys
      properties:
        companyAddonPublicId:
          type: string
          format: uuid
        commercialAddonPublicId:
          type: string
          format: uuid
        code:
          type: string
        normalizedCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
