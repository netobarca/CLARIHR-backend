  /api/v1/personnel-files/{publicId}/finalize:
    patch:
      tags:
      - personnel-files
      operationId: FinalizePersonnelFile
      summary: Complete an employee personnel file with optional user provisioning
      description: Completes a draft employee personnel file. When createUserAccount is true (or omitted), validates the configured slot role, creates or reuses the company user and issues the temporary activation invitation; when false, completes without provisioning a user.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizePersonnelFileRequest'
      responses:
        '200':
          description: Personnel file completed successfully. Company-user provisioning data is returned only when createUserAccount is true (or omitted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizePersonnelFileResponse'
        '400':
          description: Validation error, such as missing concurrency token.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have permission to manage personnel files or the tenant scope does not match.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The personnel file or its assigned position slot was not found in the tenant scope.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as stale concurrency token or an institutional email already linked to another personnel file.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Business-rule violation, such as trying to finalize a non-employee file, missing institutional email, missing slot, or missing slot role when createUserAccount is true.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
