        '400':
          description: Invalid JSON Patch document or unsupported patch path/operation.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have permission to manage job profiles or the tenant scope does not match.
