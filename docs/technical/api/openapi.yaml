  /api/v1/personnel-files/{id}/documents:
    get:
      tags:
      - personnel-files
      operationId: GetPersonnelFileDocuments
      summary: List lightweight personnel file document previews
      description: Returns document metadata for a personnel file, including a resolved `fileUrl` that the frontend can open directly without a separate download endpoint.
      security:
      - Bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Document metadata returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PersonnelFileDocumentMetadataResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have permission to read personnel files or the tenant scope does not match.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The target personnel file was not found in the tenant scope.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      tags:
      - personnel-files
      operationId: ReplacePersonnelFileDocuments
      summary: Replace the documents section of a personnel file
      description: Synchronizes the complete documents section using a multipart manifest. Items with `documentPublicId` update existing documents, items without `documentPublicId` create new documents, and active documents omitted from the manifest are inactivated. Existing documents only upload a new blob when their item includes a `fileKey`.
      security:
      - Bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - manifestJson
              - concurrencyToken
              properties:
                manifestJson:
                  type: string
                  description: |
                    JSON payload with shape `{ "items": [...] }`. Each item accepts `documentPublicId`, `documentType`, `observations`, `deliveryDate`, `loanDate`, `returnDate` and optional `fileKey`. For new documents `fileKey` is required. For existing documents `fileKey` is optional and only required when replacing the binary file.
                concurrencyToken:
                  type: string
                  format: uuid
                  description: Current concurrency token of the personnel file shell/section.
            encoding:
              manifestJson:
                contentType: application/json
      responses:
        '200':
          description: Documents section synchronized successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFileSectionResultOfPersonnelFileDocumentMetadataResponseCollection'
        '400':
          description: Validation error, malformed manifest, missing file mapping, unsupported content type or malformed payload.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '413':
          description: At least one uploaded document exceeds the 10 MiB size limit.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have permission to manage personnel files or the tenant scope does not match.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The target personnel file or a referenced document was not found in the tenant scope.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as stale personnel file concurrency token.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Business-rule violation, such as invalid document dates.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
      - personnel-files
      operationId: UploadPersonnelFileDocument
      summary: Upload a personnel file document
      description: Uploads a new personnel file document using multipart form data and returns the persisted metadata without the binary payload. Files are rejected before full buffering when they exceed 10 MiB or when extension, declared MIME type, or basic file signature is not allowed. Allowed formats are PDF, JPG/JPEG, PNG, and DOCX.
      security:
      - Bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - documentType
              - file
              - concurrencyToken
              properties:
                documentType:
                  type: string
                observations:
                  type: string
                  nullable: true
                deliveryDate:
                  type: string
                  format: date-time
                  nullable: true
                loanDate:
                  type: string
                  format: date-time
                  nullable: true
                returnDate:
                  type: string
                  format: date-time
                  nullable: true
                concurrencyToken:
                  type: string
                  format: uuid
                file:
                  type: string
                  format: binary
                  description: Binary document payload. Maximum 10 MiB. Allowed formats are .pdf, .jpg, .jpeg, .png and .docx.
      responses:
        '201':
          description: Document uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFileDocumentMetadataResponse'
        '400':
          description: Validation error, missing file, unsupported content type or malformed payload.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '413':
          description: The uploaded document exceeds the 10 MiB size limit.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have permission to manage personnel files or the tenant scope does not match.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The target personnel file was not found in the tenant scope.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Business conflict such as stale concurrency token.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Business-rule violation, such as invalid document dates.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
