          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/v1/personnel-files/{publicId}/disciplinary-actions/{disciplinaryActionPublicId}/annulment':
    patch:
      tags:
        - Personnel Files
      summary: Annul or revoke a disciplinary action
      description: "Annuls an EN_REVISION disciplinary action (trámite withdrawal — `ManageDisciplinaryActions`) or revokes an APLICADA one (revocation — the dedicated `AuthorizeDisciplinaryActions` grant + double anti-self; annuls the linked `AMONESTACION` and `SUSPENSION` entries in the same transaction). The `reason` is mandatory. Requires the `If-Match` header."
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: disciplinaryActionPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
