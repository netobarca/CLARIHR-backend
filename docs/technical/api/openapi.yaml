      parameters:
      - name: companyPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DynamicQueryPersonnelFilesRequest'
      responses:
        '200':
          description: Query results returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFileDynamicQueryResponse'
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Permission denied or tenant mismatch.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Business-rule violation.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/companies/{companyPublicId}/personnel-files/export:
    get:
      tags:
      - personnel-files
      operationId: ExportPersonnelFiles
      summary: Export a company's personnel files (synchronous)
      description: Streams the filtered personnel files as a downloadable file (default xlsx, also csv). This synchronous path is capped at the configured synchronous row limit; when the filtered result would exceed it the endpoint responds 413 Payload Too Large. For larger exports submit an asynchronous report export job (POST /api/v1/companies/{companyPublicId}/report-export-jobs with resourceKey=PERSONNEL_FILES) and download its artifact. Both paths share the same rows and filters.
      security:
      - Bearer: []
      parameters:
      - name: companyPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: format
        in: query
        required: false
        description: Export format. One of csv or xlsx.
        schema:
          type: string
          default: xlsx
      - name: isActive
        in: query
        required: false
        schema:
          type: boolean
      - name: recordType
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/PersonnelFileRecordType'
      - name: orgUnitPublicId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: minAge
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: maxAge
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: maritalStatus
        in: query
        required: false
        schema:
          type: string
      - name: nationality
        in: query
        required: false
        schema:
          type: string
      - name: profession
        in: query
        required: false
        schema:
          type: string
      - name: createdFromUtc
        in: query
        required: false
        schema:
          type: string
          format: date-time
      - name: createdToUtc
        in: query
        required: false
        schema:
          type: string
          format: date-time
      - name: q
        in: query
        required: false
        schema:
          type: string
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
      - name: sortDirection
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/PersonnelFileSortDirection'
      responses:
        '200':
          description: Export artifact stream.
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
        '400':
          description: Validation error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Permission denied or tenant mismatch.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '413':
          description: Result set exceeds the synchronous export limit; submit an asynchronous report export job instead.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/companies/{companyPublicId}/personnel-files/analytics/summary:
