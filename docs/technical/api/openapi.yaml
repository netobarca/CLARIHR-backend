      description: Applies JSON Patch inside the Job Profiles application command over the tracked aggregate. `status` is optional; when present as `add` or `replace /status`, it applies the state transition. Existing compensation is preserved when the patch does not touch `/compensation`; `remove /compensation` clears the compensation reference. Optimistic concurrency is supplied through `If-Match`; `/concurrencyToken` is not part of the patch contract. The patch document is limited to 50 operations and the request body is capped at 64 KiB.
