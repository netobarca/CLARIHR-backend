  /api/v1/personnel-files/{publicId}:
    get:
      tags:
      - personnel-files
      operationId: GetPersonnelFileShell
      summary: Get the lightweight shell of a personnel file
      description: Returns only the bootstrap payload for UI navigation and tab orchestration. The full base aggregate must be resolved through section endpoints such as `personal-info`, `identifications`, `addresses`, `documents` or `observations`.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Personnel file shell returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFileShellResponse'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have permission to read personnel files or the tenant scope does not match.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The target personnel file was not found in the tenant scope.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      tags:
      - personnel-files
      operationId: UpdatePersonnelFile
      summary: Update a personnel file
      description: Replaces the core (personal-info) fields of the personnel file and returns the updated personal-info projection. Optimistic concurrency is supplied through `If-Match`. The active state is not changed here (use PATCH `/isActive`) and `recordType` cannot be transitioned. The request body matches the create payload (without `concurrencyToken`).
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        required: true
        description: Current personnel file `concurrencyToken`, preferably quoted as an HTTP ETag.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePersonnelFileRequest'
      responses:
        '200':
          description: Personnel file updated successfully.
          headers:
            ETag:
              description: New personnel file concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFilePersonalInfoResponse'
        '400':
          description: Validation error, or missing/invalid `If-Match`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have permission to manage personnel files or the tenant scope does not match.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The target personnel file was not found in the tenant scope.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Concurrency conflict. Refresh and retry with the latest concurrency token.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Business-rule violation such as record-type transition or provisioning fields locked after completion.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
      - personnel-files
      operationId: PatchPersonnelFile
      summary: Partially update a personnel file
      description: Applies a JSON Patch (RFC 6902) document. The body is a bare array of operations sent with the `application/json-patch+json` media type (not an object with `operations`). Patchable members are the core personal-info fields plus `isActive`; toggling `isActive` replaces the former `/activate` and `/inactivate` endpoints. `recordType` cannot be transitioned. Optimistic concurrency is supplied through `If-Match`; the request body is capped at 64 KiB.
      security:
      - Bearer: []
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        required: true
        description: Current personnel file `concurrencyToken`, preferably quoted as an HTTP ETag.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/JsonPatchOperation'
      responses:
        '200':
          description: Personnel file patched successfully.
          headers:
            ETag:
              description: New personnel file concurrency token, quoted as an HTTP ETag.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFilePersonalInfoResponse'
        '400':
          description: Invalid JSON Patch document or unsupported patch path/operation.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Authentication is required.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: The authenticated user does not have permission to manage personnel files or the tenant scope does not match.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: The target personnel file was not found in the tenant scope.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Concurrency conflict. Refresh and retry with the latest concurrency token.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Business-rule violation such as record-type transition or provisioning fields locked after completion.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          description: Too many mutations for the same tenant/user window.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
