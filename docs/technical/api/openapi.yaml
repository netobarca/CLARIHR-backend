        in: header
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePersonnelFileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFilePersonalInfoResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
      - Personnel Files
      summary: Patch a personnel file
      description: |-
        Applies a JSON Patch document (RFC 6902, media type
        `application/json-patch+json`) to an existing personnel file and returns the
        updated personal information. Requires the `If-Match` header with the current
        `concurrencyToken`; the new token is returned in the `ETag` header.

        Patchable members are the core personal-info fields plus `isActive`. Setting
        `isActive` is the supported mechanism for **activating/deactivating** a
        personnel file (this endpoint replaces the former `/activate` and
        `/inactivate` endpoints). The lifecycle transition Draft → Completed remains a
        separate finalize flow.

        **Requires permission:** one of `PersonnelFiles.Admin`, `iam.administration.manage`.
      parameters:
      - name: publicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        schema:
          type: string
          format: uuid
      requestBody:
        content:
