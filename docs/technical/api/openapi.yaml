      responses:
        '200':
          description: An exact existing internal catalog value was reused.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalCatalogValueSuggestionResponse'
        '201':
          description: A new internal catalog value was created successfully.
          content:
