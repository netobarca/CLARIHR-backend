  '/api/v1/personnel-files/{publicId}/disciplinary-actions/{disciplinaryActionPublicId}/decision':
    patch:
      tags:
        - Personnel Files
      summary: Decide a disciplinary action (APLICAR / RECHAZAR)
      description: "The single decision (RN-01/RN-02). `APLICAR` → APLICADA and journals an `AMONESTACION` personnel action (plus a `SUSPENSION` entry when the suspension block travels) in the same transaction, re-checking the suspension overlap under a per-employee lock (`422 SUSPENSION_OVERLAP`) and freezing the deduction concept; `RECHAZAR` → RECHAZADA and requires a `note`. Requires the dedicated `AuthorizeDisciplinaryActions` grant (Admin excluded); the subject employee and the registrar cannot decide (double anti-self, `403 DISCIPLINARY_ACTION_SELF_APPROVAL_FORBIDDEN`). Requires the `If-Match` header."
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: disciplinaryActionPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisciplinaryActionDecisionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonnelFileDisciplinaryActionResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
