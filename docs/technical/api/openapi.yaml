openapi: 3.0.1
info:
  title: CLARIHR API
  description: Development-time API documentation for CLARIHR.
  version: v1
paths:
  '/api/v1/account/companies/{companyPublicId}/access-context':
    get:
      tags:
        - Account Access Context
      summary: Get an owned company's access context
      description: "Returns the effective access context for an owned company: the commercial context (the active\nplan and add-ons with their capability codes), the effective capabilities and modules, and the\ncurrent user's access within that company (roles, permissions and scopes). Requires ownership of\nthe company (the caller must be its creator); a company owned by another user yields `403`/`404`."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AccountCompanyAccessContextResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyAccessContextResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyAccessContextResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/v1/account/companies/{companyPublicId}/authorization/role-builder-catalog':
    get:
      tags:
        - Account Access Context
      summary: Get an owned company's role-builder catalog
      description: "Returns the catalog used to build authorization roles for an owned company: the available modules\nand capabilities (from the company's effective entitlements), the grantable (non-dormant)\npermissions, the field-policy catalog, and the supported scope types. Requires ownership of the\ncompany; a company owned by another user yields `403`/`404`."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AccountCompanyRoleBuilderCatalogResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyRoleBuilderCatalogResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyRoleBuilderCatalogResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/v1/account/companies/{companyPublicId}/authorization/resource-policies/{resourceKey}':
    get:
      tags:
        - Account Access Context
      summary: Get the current user's policy for a resource
      description: "Returns the current user's effective policy for a single resource key within an owned company:\nthe action policy (can access/read/create/update/delete) and the per-field access states\n(`hidden`/`masked`/`readonly`/`editable`, plus the required and sensitive flags). An unknown\nresource key yields `400`. Requires ownership of the company and the active tenant context to\nmatch it."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: resourceKey
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AccountCompanyResourcePolicyResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyResourcePolicyResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AccountCompanyResourcePolicyResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/v1/account/companies/{companyPublicId}/authorization/roles':
    get:
      tags:
        - Account Authorization
      summary: List authorization roles
      description: "Returns the tenant's IAM roles (paged, optionally filtered by `search`). Set\n`includeAllowedActions=true` to enrich each row with the caller's allowed actions\n(edit/delete) for client affordances. Requires `Roles:Read` (handler-gated RBAC);\nan unauthorized caller yields `403`."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pageNumber
          in: query
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: includeAllowedActions
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleSummaryResponsePagedResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleSummaryResponsePagedResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleSummaryResponsePagedResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
        - Account Authorization
      summary: Create an authorization role
      description: "Creates a custom IAM role with an optional initial grant set (`permissionIds`). Returns\n`201` with the created role; the current `concurrencyToken` is included in the body and the\n`ETag` header for use in a subsequent update. A duplicate name yields `409`. Requires\n`Roles:Create` (handler-gated RBAC)."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthorizationRoleRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateAuthorizationRoleRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateAuthorizationRoleRequest'
      responses:
        '201':
          description: Created
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/v1/account/companies/{companyPublicId}/authorization/roles/{rolePublicId}':
    get:
      tags:
        - Account Authorization
      summary: Get an authorization role
      description: "Returns a single IAM role with its full grant set. The current `concurrencyToken` is\nincluded in the body and the `ETag` header for use in the `If-Match` header of a subsequent\nupdate/patch/grants change. Requires `Roles:Read` (handler-gated RBAC); a cross-tenant id\nyields `404`."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: rolePublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      tags:
        - Account Authorization
      summary: Update an authorization role
      description: "Replaces the role's editable fields (name, description). Requires the current\n`concurrencyToken` in the `If-Match` header (missing → `400`, stale →\n`409 CONCURRENCY_CONFLICT`); the refreshed token is returned in the body and the `ETag`\nheader. System roles cannot be modified (`403`); a duplicate name yields `409`. Requires\n`Roles:Update` (handler-gated RBAC)."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: rolePublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuthorizationRoleRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/UpdateAuthorizationRoleRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/UpdateAuthorizationRoleRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
        - Account Authorization
      summary: Patch an authorization role (RFC 6902 JSON Patch)
      description: "Applies a partial update using JSON Patch (RFC 6902, media type\n`application/json-patch+json`; the wire body is a bare array of operations). Patchable\npaths: `/name` (required, cannot be removed) and `/description` (or `null`/remove to clear\nit). Grant changes use the dedicated `/grants` endpoint, not this patch; system roles cannot\nbe modified (`403`). Requires the current `concurrencyToken` in the `If-Match` header\n(missing → `400`, stale → `409 CONCURRENCY_CONFLICT`); the refreshed token is returned in\nthe body and the `ETag` header. Requires `Roles:Update` (handler-gated RBAC)."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: rolePublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json-patch+json:
            schema:
              $ref: '#/components/schemas/PatchAuthorizationRoleRequestJsonPatchDocument'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    delete:
      tags:
        - Account Authorization
      summary: Delete an authorization role
      description: "Permanently deletes a custom IAM role (hard delete — there is no soft-delete state). The\ndelete is guarded: system roles cannot be deleted (`403`) and a role still assigned to users\nyields `409` (`iam.roles.in_use`). Returns `204`. Requires `Roles:Delete` (handler-gated\nRBAC)."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: rolePublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/v1/account/companies/{companyPublicId}/authorization/roles/{rolePublicId}/grants':
    get:
      tags:
        - Account Authorization
      summary: Get an authorization role's grants
      description: "Returns the grant (permission) set of a single IAM role. The role's current\n`concurrencyToken` is included in the body and the `ETag` header for use in the `If-Match`\nheader of a subsequent grants change. Requires `Roles:Read` (handler-gated RBAC); a\ncross-tenant id yields `404`."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: rolePublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleGrantsResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleGrantsResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleGrantsResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    put:
      tags:
        - Account Authorization
      summary: Replace an authorization role's grants
      description: "Replaces the role's full grant (permission) set in one call. Enforces the\n\"keep at least one RBAC security administrator\" invariant (`409` if the change would remove\nthe last one) and protects system roles (`403`). Requires the role's current\n`concurrencyToken` in the `If-Match` header (missing → `400`, stale →\n`409 CONCURRENCY_CONFLICT`); the refreshed token is returned in the body and the `ETag`\nheader. Requires `Permissions:Update` (handler-gated RBAC)."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: rolePublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuthorizationRoleGrantsRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/UpdateAuthorizationRoleGrantsRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/UpdateAuthorizationRoleGrantsRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleGrantsResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleGrantsResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRoleGrantsResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
