  '/api/v1/companies/{companyPublicId}/job-catalogs/{category}':
    get:
      tags:
        - Job Profiles
      summary: List job catalog items in a category
      description: "Returns a paginated list of the job catalog items for the category\ngiven in the `{category}` path segment. Use the `page` and `pageSize`\nquery parameters to navigate large collections.\n\nFilter with `isActive` and a free-text query (`q`) matched against\ncode and name. Set `includeAllowedActions=true` to include, per item,\nthe operations the current user is authorized to perform on it.\n\nThese catalog items are the values that the job profile **Inline\nCatalog Create** flow (`allowInlineCatalogCreate` on the job profile\ncreate/update endpoints) can auto-create; this endpoint itself only\nlists existing items and never creates them.\n\n**Requires permission:** one of `JobProfiles.Read`, `JobProfiles.Admin`, `JobCatalogs.Admin`, `iam.administration.manage`."
      parameters:
        - name: companyPublicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: category
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/JobCatalogCategory'
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: q
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          schema:
            maximum: 100
            minimum: 1
            type: integer
            format: int32
            default: 20
        - name: includeAllowedActions
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCatalogItemResponsePagedResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
        - Job Profiles
      summary: Add a job catalog item to a category
      description: "Creates a new job catalog item (`code` + `name`) under the category\ngiven in the `{category}` path segment and returns it with a\n`201 Created` response. The `Location` header points to the created\nresource and the `ETag` header carries its initial `concurrencyToken`.\n\nThe `code` must be unique within the category. This is the explicit\ncatalog-management entry point; the job profile **Inline Catalog\nCreate** flow (`allowInlineCatalogCreate`) is a separate path that can\nauto-create the same kind of item while saving a job profile.\n\n**Requires permission:** one of `JobCatalogs.Admin`, `iam.administration.manage`."
