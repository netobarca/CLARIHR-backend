  '/api/v1/files/{filePublicId}/complete':
    patch:
      tags:
        - Files
      summary: Complete a file upload
      description: "Finalizes a pending upload: verifies the binary exists in storage and adopts its\nserver-side size/content-type, then marks the file `Active`. Only the file's uploader may\ncomplete it (`403`). Requires the current `concurrencyToken` in the body; a stale token\nyields `409 CONCURRENCY_CONFLICT`, and a file not pending / not found in storage yields\n`422`."
      parameters:
        - name: filePublicId
          in: path
          required: true
          schema:
            type: string
