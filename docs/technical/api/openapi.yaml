  /api/v1/companies/{companyPublicId}/job-catalogs/{category}:
    get:
      tags:
      - Job Profiles
      summary: List job catalog items in a category
      description: |-
        Returns a paginated list of the job catalog items for the category
        given in the `{category}` path segment. Use the `page` and `pageSize`
        query parameters to navigate large collections.

        Filter with `isActive` and a free-text query (`q`) matched against
        code and name. Set `includeAllowedActions=true` to include, per item,
        the operations the current user is authorized to perform on it.

        These catalog items are the values that the job profile **Inline
        Catalog Create** flow (`allowInlineCatalogCreate` on the job profile
        create/update endpoints) can auto-create; this endpoint itself only
        lists existing items and never creates them.

        **Requires permission:** one of `JobProfiles.Read`, `JobProfiles.Admin`, `JobCatalogs.Admin`, `iam.administration.manage`.
      parameters:
      - name: companyPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/JobCatalogCategory'
      - name: isActive
        in: query
        schema:
          type: boolean
      - name: q
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: integer
          format: int32
          default: 1
      - name: pageSize
        in: query
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 20
      - name: includeAllowedActions
        in: query
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponseOfJobCatalogItemResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
      - Job Profiles
      summary: Add a job catalog item to a category
      description: |-
        Creates a new job catalog item (`code` + `name`) under the category
        given in the `{category}` path segment and returns it with a
        `201 Created` response. The `Location` header points to the created
        resource and the `ETag` header carries its initial `concurrencyToken`.

        The `code` must be unique within the category. This is the explicit
        catalog-management entry point; the job profile **Inline Catalog
        Create** flow (`allowInlineCatalogCreate`) is a separate path that can
        auto-create the same kind of item while saving a job profile.

        **Requires permission:** one of `JobCatalogs.Admin`, `iam.administration.manage`.
      parameters:
      - name: companyPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/JobCatalogCategory'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobCatalogItemRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCatalogItemResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/v1/companies/{companyPublicId}/job-catalogs/{category}/{jobCatalogPublicId}:
    put:
      tags:
      - Job Profiles
      summary: Replace a job catalog item
      description: |-
        Replaces all fields (`code`, `name`, `isActive`) of an existing job
        catalog item. Requires the `If-Match` header with the current
        `concurrencyToken` to prevent lost updates. The new token is returned
        in the `ETag` header.

        System items cannot be modified and the `code` must remain unique
        within the category.

        **Requires permission:** one of `JobCatalogs.Admin`, `iam.administration.manage`.
      parameters:
      - name: companyPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/JobCatalogCategory'
      - name: jobCatalogPublicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJobCatalogItemRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCatalogItemResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
