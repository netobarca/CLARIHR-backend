# Local development services for CLARIHR.
#
#   docker compose up -d        # start all three (storage, db, PDF renderer)
#
# After `dotnet ef database update`, the API run in the Development environment
# (appsettings.Development.json — no secrets, points here) can export PDFs/CSVs
# locally without any Azure dependency. See README "Local development".
#
# - postgres  : application database (Database:ConnectionString → localhost:5432)
# - azurite   : Azure Blob emulator for file storage (Storage:AzureBlob, Shared Key) — §3.5
# - gotenberg : HTML→PDF renderer (Reporting:Pdf:Engine=Gotenberg) — §4.2
services:
  postgres:
    image: postgres:16
    container_name: clarihr-postgres
    environment:
      POSTGRES_USER: clarihr
      POSTGRES_PASSWORD: clarihr
      POSTGRES_DB: clarihr_dev
    ports:
      - "5433:5432"
    volumes:
      - clarihr-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: clarihr-azurite
    command: "azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck"
    ports:
      - "10000:10000"
    volumes:
      - clarihr-azurite:/data
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: clarihr-gotenberg
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  clarihr-pgdata:
  clarihr-azurite:
