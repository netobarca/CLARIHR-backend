name: secret-scan

# §N1 — fail CI if a secret is committed to a tracked file. Scans the working tree
# (--no-git) so it gates NEW secrets without failing on not-yet-purged history.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan working tree for secrets (gitleaks)
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/repo"
          -w /repo
          zricethezav/gitleaks:v8.18.4
          detect --no-git --config /repo/.gitleaks.toml --redact --verbose --exit-code 1
